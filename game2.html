<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 2：氣流大風吹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #E8F5E9; 
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #game-container { width: 100vw; height: 100vh; position: relative; }

        #ui-layer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 40px; align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 40px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 32px; font-weight: bold;
        }

        #teacher-panel {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            background: #FFF9C4; border: 4px solid #FBC02D;
            padding: 15px 40px; border-radius: 30px;
            font-size: 45px; font-weight: bold; color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            z-index: 90; text-align: center;
            transition: all 0.3s;
        }
        
        .teacher-highlight { color: #E53935; }

        #circle-zone {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            border-radius: 50%;
        }

        .word-bubble {
            position: absolute;
            width: 160px; height: 160px;
            background: white;
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), inset -5px -5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 4px solid #4FC3F7;
            transition: transform 0.1s;
            transform-origin: center center;
        }

        .word-bubble:active { transform: scale(0.9); }

        /* 根據文字長度自動適應，避免超出泡泡 */
        .word-poj { font-size: 32px; font-weight: bold; color: #0277BD; line-height: 1.2; text-align: center; }
        .word-hanzi { font-size: 42px; font-weight: bold; color: #424242; line-height: 1.2; text-align: center; }

        .blown-away {
            animation: blowAwayAnim 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }
        @keyframes blowAwayAnim {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) translate(0px, -500px) rotate(360deg); opacity: 0; }
        }

        .shake { animation: shakeAnim 0.4s; }
        @keyframes shakeAnim {
            0% { transform: translateX(0); border-color: #EF5350; background: #FFEBEE; }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); border-color: #4FC3F7; background: white; }
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        .overlay h1 { font-size: 70px; margin-bottom: 10px; }
        .overlay p { font-size: 30px; margin-bottom: 30px; color: #ddd; }
        
        .options-panel { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; }
        .option-label {
            background: rgba(255,255,255,0.2); padding: 10px 25px;
            border-radius: 50px; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .option-label:hover { background: rgba(255,255,255,0.3); }
        .option-label input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; }
        
        .time-input-container {
            background: rgba(255,255,255,0.4); padding: 10px 25px;
            border-radius: 50px; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; gap: 10px; border: 2px solid white;
        }
        .time-input-container input {
            font-size: 24px; width: 80px; text-align: center; font-weight: bold;
            border-radius: 10px; border: none; padding: 5px; font-family: inherit;
        }

        .error-msg { color: #FFCDD2; font-size: 24px; font-weight: bold; height: 35px; margin-bottom: 10px; }

        .btn-group { display: flex; gap: 15px; }
        .btn {
            font-size: 32px; padding: 15px 40px; border: none;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s;
            font-family: inherit;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-easy { background: #81C784; color: white; }
        .btn-normal { background: #FFB74D; color: white; }
        .btn-hard { background: #E57373; color: white; }

        .btn-exit {
            background: #E57373; color: white; border: none; border-radius: 15px;
            padding: 8px 20px; font-size: 24px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-family: inherit; margin-left: 20px;
        }
        .btn-exit:hover { transform: scale(1.05); background: #ef5350; }

        .feedback {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; font-weight: bold; z-index: 150; animation: popFeedback 0.8s forwards; pointer-events: none;
        }
        @keyframes popFeedback {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer" class="hidden">
            <div>⏱️ <span id="timer">60</span></div>
            <div>🏆 <span id="score">0</span></div>
            <button class="btn-exit" onclick="exitGame()">❌ 跳出</button>
            <button class="btn-exit" id="btn-sound" onclick="toggleSound()" style="background: #4DB6AC;">🔊 音效開</button>
        </div>
        
        <div id="teacher-panel" class="hidden">
            老師說：💨 吹走 <span class="teacher-highlight" id="prompt-text">【有氣音】</span> 的字！
        </div>

        <div id="circle-zone"></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>🌪️ 氣流大風吹</h1>
        <p>老師出題，把正確的字吹走吧！</p>
        
        <div class="options-panel">
            <label class="option-label">
                <input type="checkbox" id="opt-poj" checked> 顯示白話字
            </label>
            <label class="option-label">
                <input type="checkbox" id="opt-hanzi" checked> 顯示漢字
            </label>
        </div>

        <div class="options-panel" style="margin-bottom: 10px;">
            <div class="time-input-container">
                遊戲時間: <input type="number" id="game-duration" value="60" min="10" max="600"> 秒
            </div>
        </div>
        
        <div id="error-msg" class="error-msg"></div>

        <div class="btn-group">
            <button class="btn btn-easy" onclick="checkAndStart(4)">簡單 (4個字)</button>
            <button class="btn btn-normal" onclick="checkAndStart(6)">普通 (6個字)</button>
            <button class="btn btn-hard" onclick="checkAndStart(8)">挑戰 (8個字)</button>
        </div>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1>時間到！</h1>
        <p>總共得分解除：<strong id="final-score" style="color: #FFD700; font-size: 60px;">0</strong></p>
        <button class="btn btn-normal" onclick="location.reload()">回主畫面</button>
    </div>

    <script>
        // --- 嚴格校正版 POJ 題庫系統 (無氣音 vs 有氣音) ---
        // 確保 100% 符合教會白話字規範：正確掛音、ch/chh、o͘
        
        const unaspiratedDB = [
            // P (無氣)
            { p: 'pa', h: '爸' }, { p: 'pē', h: '父' }, { p: 'pí', h: '比' }, { p: 'pó', h: '保' }, { p: 'po͘', h: '埔' },
            { p: 'páng', h: '板' }, { p: 'peng', h: '冰' }, { p: 'pún', h: '本' }, { p: 'pêng', h: '平' }, { p: 'pak', h: '腹' },
            { p: 'pat', h: '八' }, { p: 'pò͘', h: '布' }, { p: 'poe', h: '杯' }, { p: 'pau', h: '包' }, { p: 'pn̄g', h: '飯' },
            { p: 'pòaⁿ', h: '半' }, { p: 'pān', h: '辦' }, { p: 'pâng', h: '房' }, { p: 'pái', h: '擺' }, { p: 'peh', h: '爬' },
            // K (無氣)
            { p: 'ka', h: '鉸' }, { p: 'ke', h: '雞' }, { p: 'ki', h: '枝' }, { p: 'ko', h: '哥' }, { p: 'ku', h: '龜' },
            { p: 'kam', h: '甘' }, { p: 'kan', h: '干' }, { p: 'kang', h: '工' }, { p: 'kin', h: '斤' }, { p: 'keng', h: '更' },
            { p: 'kò͘', h: '顧' }, { p: 'koa', h: '歌' }, { p: 'kui', h: '規' }, { p: 'kiù', h: '救' }, { p: 'kóng', h: '講' },
            { p: 'kiáⁿ', h: '囝' }, { p: 'kám', h: '敢' }, { p: 'kok', h: '國' }, { p: 'kàu', h: '教' }, { p: 'kau', h: '交' },
            // T (無氣)
            { p: 'ta', h: '焦' }, { p: 'tē', h: '地' }, { p: 'ti', h: '豬' }, { p: 'to', h: '刀' }, { p: 'tú', h: '拄' },
            { p: 'tām', h: '淡' }, { p: 'tan', h: '單' }, { p: 'tang', h: '冬' }, { p: 'tīn', h: '陣' }, { p: 'teng', h: '燈' },
            { p: 'tōa', h: '大' }, { p: 'táu', h: '斗' }, { p: 'tiau', h: '刁' }, { p: 'tn̂g', h: '長' }, { p: 'tó', h: '倒' },
            { p: 'tâi', h: '臺' }, { p: 'tôaⁿ', h: '彈' }, { p: 'tiàm', h: '店' }, { p: 'tńg', h: '轉' }, { p: 'tek', h: '竹' },
            // Ch (無氣)
            { p: 'chá', h: '早' }, { p: 'chē', h: '坐' }, { p: 'chîⁿ', h: '錢' }, { p: 'chò', h: '做' }, { p: 'chú', h: '主' },
            { p: 'chām', h: '站' }, { p: 'chàn', h: '讚' }, { p: 'chóng', h: '總' }, { p: 'chin', h: '真' }, { p: 'cheng', h: '鐘' },
            { p: 'chian', h: '煎' }, { p: 'chóa', h: '紙' }, { p: 'cháu', h: '走' }, { p: 'chiú', h: '酒' }, { p: 'chûn', h: '船' },
            { p: 'chia̍h', h: '食' }, { p: 'chiáu', h: '鳥' }, { p: 'chit', h: '這' }, { p: 'chiàu', h: '照' }, { p: 'chiong', h: '將' }
        ];

        const aspiratedDB = [
            // Ph (有氣)
            { p: 'pha', h: '葩' }, { p: 'phe', h: '批' }, { p: 'phīⁿ', h: '鼻' }, { p: 'phō', h: '抱' }, { p: 'phû', h: '浮' },
            { p: 'phang', h: '香' }, { p: 'pheng', h: '砰' }, { p: 'phûn', h: '盆' }, { p: 'phêng', h: '評' }, { p: 'phòa', h: '破' },
            { p: 'phah', h: '拍' }, { p: 'phài', h: '派' }, { p: 'phau', h: '泡' }, { p: 'pho', h: '波' }, { p: 'pháiⁿ', h: '歹' },
            { p: 'phòe', h: '配' }, { p: 'phiàn', h: '騙' }, { p: 'phāng', h: '縫' }, { p: 'phi', h: '披' }, { p: 'phoah', h: '潑' },
            // Kh (有氣)
            { p: 'kha', h: '腳' }, { p: 'khe', h: '溪' }, { p: 'khí', h: '齒' }, { p: 'khò͘', h: '褲' }, { p: 'khu', h: '區' },
            { p: 'khàm', h: '崁' }, { p: 'khan', h: '牽' }, { p: 'khang', h: '空' }, { p: 'khin', h: '輕' }, { p: 'kheng', h: '坑' },
            { p: 'khui', h: '開' }, { p: 'khoa', h: '誇' }, { p: 'khàu', h: '哭' }, { p: 'khì', h: '氣' }, { p: 'khó͘', h: '苦' },
            { p: 'khoaⁿ', h: '寬' }, { p: 'khiām', h: '儉' }, { p: 'khiā', h: '徛' }, { p: 'khùn', h: '睏' }, { p: 'khioh', h: '拾' },
            // Th (有氣)
            { p: 'thoa', h: '拖' }, { p: 'thê', h: '提' }, { p: 'thiⁿ', h: '天' }, { p: 'thô͘', h: '土' }, { p: 'thâu', h: '頭' },
            { p: 'tham', h: '貪' }, { p: 'thàn', h: '趁' }, { p: 'thang', h: '通' }, { p: 'thin', h: '秤' }, { p: 'theng', h: '聽' },
            { p: 'thàu', h: '透' }, { p: 'thó', h: '討' }, { p: 'thiàu', h: '跳' }, { p: 'thng', h: '湯' }, { p: 'thò͘', h: '兔' },
            { p: 'thn̂g', h: '糖' }, { p: 'thih', h: '鐵' }, { p: 'thāi', h: '待' }, { p: 'thè', h: '退' }, { p: 'tha̍k', h: '讀' },
            // Chh (有氣)
            { p: 'chhâ', h: '柴' }, { p: 'chhē', h: '揣' }, { p: 'chhī', h: '市' }, { p: 'chhó', h: '草' }, { p: 'chhù', h: '厝' },
            { p: 'chham', h: '參' }, { p: 'chhân', h: '田' }, { p: 'chhang', h: '蔥' }, { p: 'chhin', h: '親' }, { p: 'chheng', h: '清' },
            { p: 'chhian', h: '千' }, { p: 'chhùi', h: '嘴' }, { p: 'chhiū', h: '樹' }, { p: 'chhēng', h: '穿' }, { p: 'chhàu', h: '臭' },
            { p: 'chhiùⁿ', h: '唱' }, { p: 'chhiò', h: '笑' }, { p: 'chhut', h: '出' }, { p: 'chhōa', h: '帶' }, { p: 'chhèng', h: '銃' }
        ];

        // --- 遊戲邏輯變數 ---
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let wordCount = 6; 
        let currentPromptType = 'aspirated'; 
        let targetRemaining = 0; 

        let showPOJ = true;
        let showHanzi = true;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const circleZone = document.getElementById('circle-zone');
        const promptText = document.getElementById('prompt-text');
        const teacherPanel = document.getElementById('teacher-panel');

        // --- 音效引擎 (Web Audio API) ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; 
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWind() {
            if (!soundEnabled || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.2);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.4);
        }

        // --- 核心遊戲流程 ---
        function checkAndStart(count) {
            wordCount = count;
            showPOJ = document.getElementById('opt-poj').checked;
            showHanzi = document.getElementById('opt-hanzi').checked;
            
            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) {
                customDuration = 60; document.getElementById('game-duration').value = 60;
            }

            if (!showPOJ && !showHanzi) {
                document.getElementById('error-msg').innerText = "⚠️ 請至少勾選一種顯示模式！";
                return;
            }
            document.getElementById('error-msg').innerText = "";

            initAudio();
            startGame(customDuration);
        }

        function startGame(duration) {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('teacher-panel').classList.remove('hidden');
            
            score = 0;
            timeLeft = duration;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            
            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
            
            generateCircle();
        }

        function endGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('teacher-panel').classList.add('hidden');
            circleZone.innerHTML = '';
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function exitGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            circleZone.innerHTML = '';
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('teacher-panel').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function getRandomWords(sourceArray, count) {
            let shuffled = [...sourceArray].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function generateCircle() {
            circleZone.innerHTML = ''; 
            
            currentPromptType = Math.random() < 0.5 ? 'aspirated' : 'unaspirated';
            
            if (currentPromptType === 'aspirated') {
                promptText.innerText = "【有氣音 (h)】";
                promptText.style.color = "#E53935"; 
            } else {
                promptText.innerText = "【無氣音 (無h)】";
                promptText.style.color = "#1E88E5"; 
            }

            let words = [];
            let targetAmount = Math.floor(Math.random() * (wordCount / 2)) + 1; 
            targetRemaining = targetAmount;

            if (currentPromptType === 'aspirated') {
                words = words.concat(getRandomWords(aspiratedDB, targetAmount).map(w => ({...w, isTarget: true})));
                words = words.concat(getRandomWords(unaspiratedDB, wordCount - targetAmount).map(w => ({...w, isTarget: false})));
            } else {
                words = words.concat(getRandomWords(unaspiratedDB, targetAmount).map(w => ({...w, isTarget: true})));
                words = words.concat(getRandomWords(aspiratedDB, wordCount - targetAmount).map(w => ({...w, isTarget: false})));
            }

            words.sort(() => Math.random() - 0.5);

            const radius = 220; 
            const centerX = 300; 
            const centerY = 300;

            words.forEach((wordObj, index) => {
                const angle = (index / wordCount) * (2 * Math.PI) - (Math.PI / 2); 
                
                const x = centerX + radius * Math.cos(angle) - 80; 
                const y = centerY + radius * Math.sin(angle) - 80;

                const bubble = document.createElement('div');
                bubble.className = 'word-bubble';
                bubble.style.left = x + 'px';
                bubble.style.top = y + 'px';
                
                let htmlContent = '';
                if (showPOJ) htmlContent += `<div class="word-poj">${wordObj.p}</div>`;
                if (showHanzi) htmlContent += `<div class="word-hanzi">${wordObj.h}</div>`;
                bubble.innerHTML = htmlContent;

                const handleAction = (e) => {
                    e.preventDefault();
                    if (bubble.classList.contains('blown-away')) return; 
                    
                    if (wordObj.isTarget) {
                        playWind();
                        playCorrect();
                        bubble.classList.add('blown-away');
                        score += 10;
                        scoreEl.innerText = score;
                        targetRemaining--;
                        
                        if (targetRemaining <= 0) {
                            setTimeout(generateCircle, 600); 
                        }
                    } else {
                        playWrong();
                        score = Math.max(0, score - 5); 
                        scoreEl.innerText = score;
                        
                        bubble.classList.remove('shake');
                        void bubble.offsetWidth; 
                        bubble.classList.add('shake');
                    }
                };
                
                bubble.addEventListener('mousedown', handleAction);
                bubble.addEventListener('touchstart', handleAction);

                circleZone.appendChild(bubble);
            });
        }
    </script>
</body>
</html>
