<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 2：氣流大風吹</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Noto Sans 確保中文字與白話字顯示乾淨現代 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #E8F5E9; /* 護眼淺綠 */
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        /* RWD 變數定義：根據螢幕寬度切換泡泡與字體大小 */
        :root {
            --bubble-size: 85px;
            --bubble-half: 42.5px;
            --poj-size: 22px;
            --hanzi-size: 26px;
        }
        @media (min-width: 480px) {
            :root {
                --bubble-size: 110px; --bubble-half: 55px;
                --poj-size: 28px; --hanzi-size: 34px;
            }
        }
        @media (min-width: 768px) {
            :root {
                --bubble-size: 150px; --bubble-half: 75px;
                --poj-size: 36px; --hanzi-size: 45px;
            }
        }

        #game-container { width: 100vw; height: 100vh; position: relative; }

        /* 動態圓形遊戲區 (響應式正方形) */
        #circle-zone {
            position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%);
            width: 95vw; height: 95vw; max-width: 700px; max-height: 700px;
            border-radius: 50%;
        }
        @media (min-width: 768px) {
            #circle-zone { top: 55%; }
        }

        /* 老師提示面板：移至圓形正中央 */
        #teacher-panel {
            position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 249, 196, 0.95); border: 3px solid #FBC02D;
            padding: 12px 20px; border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            z-index: 5; /* 層級低於泡泡，讓泡泡能浮在上面 */
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s;
            width: max-content;
            pointer-events: none; /* 關鍵：穿透點擊！就算重疊，也不會擋住下方泡泡的點擊事件 */
        }
        @media (min-width: 768px) {
            #teacher-panel { top: 55%; padding: 20px 40px; border-width: 4px; border-radius: 35px; }
        }
        
        .teacher-highlight { font-weight: 900; }

        /* 泡泡設計 */
        .word-bubble {
            position: absolute;
            width: var(--bubble-size); height: var(--bubble-size);
            background: white;
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), inset -5px -5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 4px solid #4FC3F7;
            transition: transform 0.1s;
            z-index: 10; /* 確保泡泡的層級最高 */
        }
        .word-bubble:active { transform: scale(0.9) !important; }

        /* 完美防護白話字體設定 (防豆腐字、防被切斷) */
        .word-poj { 
            font-size: var(--poj-size); font-weight: bold; color: #0277BD; line-height: 1.2; text-align: center; 
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0 !important;
            padding-right: 0.15em;
            display: inline-block;
        }
        .word-hanzi { font-size: var(--hanzi-size); font-weight: bold; color: #424242; line-height: 1.2; text-align: center; }

        /* 動畫效果 */
        .blown-away {
            animation: blowAwayAnim 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }
        @keyframes blowAwayAnim {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) translate(0px, -500px) rotate(360deg); opacity: 0; }
        }

        .shake { animation: shakeAnim 0.4s; }
        @keyframes shakeAnim {
            0% { transform: translateX(0); border-color: #EF5350; background: #FFEBEE; }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); border-color: #4FC3F7; background: white; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 頂部 UI 面板 -->
        <div id="ui-layer" class="hidden absolute top-4 left-1/2 transform -translate-x-1/2 flex gap-3 md:gap-6 z-50 bg-white/95 px-4 md:px-8 py-2 md:py-3 rounded-full shadow-lg items-center w-max max-w-[95vw]">
            <div class="text-xl md:text-3xl font-black text-gray-800 flex items-center">⏱️ <span id="timer" class="ml-1 w-8 text-center text-blue-600">60</span></div>
            <div class="text-xl md:text-3xl font-black text-gray-800 flex items-center">🏆 <span id="score" class="ml-1 w-8 text-center text-orange-500">0</span></div>
            <button onclick="exitGame()" class="bg-red-500 hover:bg-red-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow">❌ 跳出</button>
            <button id="btn-sound" onclick="toggleSound()" class="bg-teal-500 hover:bg-teal-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow">🔊 音效開</button>
        </div>
        
        <!-- 更新排版：兩行置中的老師提示 -->
        <div id="teacher-panel" class="hidden">
            <div class="text-gray-600 text-base md:text-2xl font-bold mb-1 md:mb-2">老師說：💨 吹走</div>
            <div class="teacher-highlight text-2xl md:text-5xl drop-shadow-sm" id="prompt-text">【有氣音】</div>
        </div>

        <div id="circle-zone"></div>
    </div>

    <!-- 開始選單 -->
    <div id="start-screen" class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center z-[100] p-4 overflow-y-auto">
        <div class="bg-white/10 p-6 md:p-10 rounded-3xl backdrop-blur-md max-w-3xl w-full border border-white/20 shadow-2xl flex flex-col items-center my-auto">
            <h1 class="text-4xl md:text-6xl text-yellow-300 font-black mb-2 text-center drop-shadow-lg">🌪️ 氣流大風吹</h1>
            <p class="text-gray-200 text-lg md:text-2xl mb-8 text-center font-bold">老師出題，把正確的字吹走吧！</p>
            
            <div class="w-full bg-white/20 p-4 md:p-6 rounded-2xl mb-6">
                <div class="flex flex-wrap justify-center gap-6">
                    <label class="flex items-center gap-3 cursor-pointer bg-blue-900/50 hover:bg-blue-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-poj" checked class="w-6 h-6 md:w-8 md:h-8 accent-blue-500">
                        <span class="text-white text-lg md:text-2xl font-bold">顯示白話字</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer bg-green-900/50 hover:bg-green-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-hanzi" checked class="w-6 h-6 md:w-8 md:h-8 accent-green-500">
                        <span class="text-white text-lg md:text-2xl font-bold">顯示漢字</span>
                    </label>
                </div>
                <div id="error-msg" class="text-red-300 font-bold text-lg md:text-xl text-center mt-3 h-6"></div>
            </div>

            <div class="flex items-center gap-4 bg-white/20 p-3 md:p-4 rounded-full mb-8">
                <span class="text-white text-lg md:text-2xl font-bold ml-2">⏳ 遊戲時間：</span>
                <input type="number" id="game-duration" value="60" min="10" max="600" class="w-20 md:w-24 text-center text-xl md:text-2xl font-black rounded-lg p-1 bg-white/90 text-blue-900 border-none outline-none">
                <span class="text-white text-lg md:text-2xl font-bold mr-2">秒</span>
            </div>
            
            <div class="flex flex-wrap justify-center gap-4 w-full">
                <button onclick="checkAndStart(4)" class="flex-1 min-w-[120px] bg-green-500 hover:bg-green-600 text-white text-xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#2E7D32] hover:translate-y-1 hover:shadow-[0_2px_0_#2E7D32] transition-all">簡單 (4字)</button>
                <button onclick="checkAndStart(6)" class="flex-1 min-w-[120px] bg-orange-500 hover:bg-orange-600 text-white text-xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#E65100] hover:translate-y-1 hover:shadow-[0_2px_0_#E65100] transition-all">普通 (6字)</button>
                <button onclick="checkAndStart(8)" class="flex-1 min-w-[120px] bg-red-500 hover:bg-red-600 text-white text-xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#C62828] hover:translate-y-1 hover:shadow-[0_2px_0_#C62828] transition-all">挑戰 (8字)</button>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-[100] p-4 text-center">
        <h1 class="text-6xl md:text-8xl text-yellow-400 font-black mb-4 drop-shadow-[0_0_15px_rgba(253,224,71,0.8)]">時間到！</h1>
        <p class="text-white text-2xl md:text-4xl mb-10">總共得分解除：<strong id="final-score" class="text-6xl md:text-8xl text-green-400 mx-2">0</strong></p>
        <button onclick="location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white text-3xl font-black px-10 py-4 rounded-full shadow-[0_6px_0_#1565C0] hover:translate-y-1 hover:shadow-[0_2px_0_#1565C0] transition-all">回主畫面</button>
    </div>

    <script>
        // --- 嚴格校正版 POJ 題庫系統 (無氣音 vs 有氣音) ---
        const unaspiratedDB = [
            { p: 'pa', h: '爸' }, { p: 'pē', h: '父' }, { p: 'pí', h: '比' }, { p: 'pó', h: '保' }, { p: 'po͘', h: '埔' },
            { p: 'páng', h: '板' }, { p: 'peng', h: '冰' }, { p: 'pún', h: '本' }, { p: 'pêng', h: '平' }, { p: 'pak', h: '腹' },
            { p: 'pat', h: '八' }, { p: 'pò͘', h: '布' }, { p: 'poe', h: '杯' }, { p: 'pau', h: '包' }, { p: 'pn̄g', h: '飯' },
            { p: 'pòaⁿ', h: '半' }, { p: 'pān', h: '辦' }, { p: 'pâng', h: '房' }, { p: 'pái', h: '擺' }, { p: 'peh', h: '爬' },
            { p: 'ka', h: '鉸' }, { p: 'ke', h: '雞' }, { p: 'ki', h: '枝' }, { p: 'ko', h: '哥' }, { p: 'ku', h: '龜' },
            { p: 'kam', h: '甘' }, { p: 'kan', h: '干' }, { p: 'kang', h: '工' }, { p: 'kin', h: '斤' }, { p: 'keng', h: '更' },
            { p: 'kò͘', h: '顧' }, { p: 'koa', h: '歌' }, { p: 'kui', h: '規' }, { p: 'kiù', h: '救' }, { p: 'kóng', h: '講' },
            { p: 'kiáⁿ', h: '囝' }, { p: 'kám', h: '敢' }, { p: 'kok', h: '國' }, { p: 'kàu', h: '教' }, { p: 'kau', h: '交' },
            { p: 'ta', h: '焦' }, { p: 'tē', h: '地' }, { p: 'ti', h: '豬' }, { p: 'to', h: '刀' }, { p: 'tú', h: '拄' },
            { p: 'tām', h: '淡' }, { p: 'tan', h: '單' }, { p: 'tang', h: '冬' }, { p: 'tīn', h: '陣' }, { p: 'teng', h: '燈' },
            { p: 'tōa', h: '大' }, { p: 'táu', h: '斗' }, { p: 'tiau', h: '刁' }, { p: 'tn̂g', h: '長' }, { p: 'tó', h: '倒' },
            { p: 'tâi', h: '臺' }, { p: 'tôaⁿ', h: '彈' }, { p: 'tiàm', h: '店' }, { p: 'tńg', h: '轉' }, { p: 'tek', h: '竹' },
            { p: 'chá', h: '早' }, { p: 'chē', h: '坐' }, { p: 'chîⁿ', h: '錢' }, { p: 'chò', h: '做' }, { p: 'chú', h: '主' },
            { p: 'chām', h: '站' }, { p: 'chàn', h: '讚' }, { p: 'chóng', h: '總' }, { p: 'chin', h: '真' }, { p: 'cheng', h: '鐘' },
            { p: 'chian', h: '煎' }, { p: 'chóa', h: '紙' }, { p: 'cháu', h: '走' }, { p: 'chiú', h: '酒' }, { p: 'chûn', h: '船' },
            { p: 'chia̍h', h: '食' }, { p: 'chiáu', h: '鳥' }, { p: 'chit', h: '這' }, { p: 'chiàu', h: '照' }, { p: 'chiong', h: '將' }
        ];

        const aspiratedDB = [
            { p: 'pha', h: '葩' }, { p: 'phe', h: '批' }, { p: 'phīⁿ', h: '鼻' }, { p: 'phō', h: '抱' }, { p: 'phû', h: '浮' },
            { p: 'phang', h: '香' }, { p: 'pheng', h: '砰' }, { p: 'phûn', h: '盆' }, { p: 'phêng', h: '評' }, { p: 'phòa', h: '破' },
            { p: 'phah', h: '拍' }, { p: 'phài', h: '派' }, { p: 'phau', h: '泡' }, { p: 'pho', h: '波' }, { p: 'pháiⁿ', h: '歹' },
            { p: 'phòe', h: '配' }, { p: 'phiàn', h: '騙' }, { p: 'phāng', h: '縫' }, { p: 'phi', h: '披' }, { p: 'phoah', h: '潑' },
            { p: 'kha', h: '腳' }, { p: 'khe', h: '溪' }, { p: 'khí', h: '齒' }, { p: 'khò͘', h: '褲' }, { p: 'khu', h: '區' },
            { p: 'khàm', h: '崁' }, { p: 'khan', h: '牽' }, { p: 'khang', h: '空' }, { p: 'khin', h: '輕' }, { p: 'kheng', h: '坑' },
            { p: 'khui', h: '開' }, { p: 'khoa', h: '誇' }, { p: 'khàu', h: '哭' }, { p: 'khì', h: '氣' }, { p: 'khó͘', h: '苦' },
            { p: 'khoaⁿ', h: '寬' }, { p: 'khiām', h: '儉' }, { p: 'khiā', h: '徛' }, { p: 'khùn', h: '睏' }, { p: 'khioh', h: '拾' },
            { p: 'thoa', h: '拖' }, { p: 'thê', h: '提' }, { p: 'thiⁿ', h: '天' }, { p: 'thô͘', h: '土' }, { p: 'thâu', h: '頭' },
            { p: 'tham', h: '貪' }, { p: 'thàn', h: '趁' }, { p: 'thang', h: '通' }, { p: 'thin', h: '秤' }, { p: 'theng', h: '聽' },
            { p: 'thàu', h: '透' }, { p: 'thó', h: '討' }, { p: 'thiàu', h: '跳' }, { p: 'thng', h: '湯' }, { p: 'thò͘', h: '兔' },
            { p: 'thn̂g', h: '糖' }, { p: 'thih', h: '鐵' }, { p: 'thāi', h: '待' }, { p: 'thè', h: '退' }, { p: 'tha̍k', h: '讀' },
            { p: 'chhâ', h: '柴' }, { p: 'chhē', h: '揣' }, { p: 'chhī', h: '市' }, { p: 'chhó', h: '草' }, { p: 'chhù', h: '厝' },
            { p: 'chham', h: '參' }, { p: 'chhân', h: '田' }, { p: 'chhang', h: '蔥' }, { p: 'chhin', h: '親' }, { p: 'chheng', h: '清' },
            { p: 'chhian', h: '千' }, { p: 'chhùi', h: '嘴' }, { p: 'chhiū', h: '樹' }, { p: 'chhēng', h: '穿' }, { p: 'chhàu', h: '臭' },
            { p: 'chhiùⁿ', h: '唱' }, { p: 'chhiò', h: '笑' }, { p: 'chhut', h: '出' }, { p: 'chhōa', h: '帶' }, { p: 'chhèng', h: '銃' }
        ];

        // --- 遊戲邏輯變數 ---
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let wordCount = 6; 
        let currentPromptType = 'aspirated'; 
        let targetRemaining = 0; 

        let showPOJ = true;
        let showHanzi = true;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const circleZone = document.getElementById('circle-zone');
        const promptText = document.getElementById('prompt-text');

        // --- 音效引擎 (Web Audio API) ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; 
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            document.getElementById('btn-sound').className = soundEnabled 
                ? "bg-teal-500 hover:bg-teal-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow"
                : "bg-gray-500 hover:bg-gray-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow";
            
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWind() {
            if (!soundEnabled || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.2);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.4);
        }

        // --- 核心遊戲流程 ---
        function checkAndStart(count) {
            wordCount = count;
            showPOJ = document.getElementById('opt-poj').checked;
            showHanzi = document.getElementById('opt-hanzi').checked;
            
            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) {
                customDuration = 60; document.getElementById('game-duration').value = 60;
            }

            if (!showPOJ && !showHanzi) {
                document.getElementById('error-msg').innerText = "⚠️ 請至少勾選一種顯示模式！";
                return;
            }
            document.getElementById('error-msg').innerText = "";

            initAudio();
            startGame(customDuration);
        }

        function startGame(duration) {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('teacher-panel').classList.remove('hidden');
            
            score = 0;
            timeLeft = duration;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            
            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
            
            generateCircle();
        }

        function endGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('teacher-panel').classList.add('hidden');
            circleZone.innerHTML = '';
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function exitGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            circleZone.innerHTML = '';
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('teacher-panel').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function getRandomWords(sourceArray, count) {
            let shuffled = [...sourceArray].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        function generateCircle() {
            circleZone.innerHTML = ''; 
            
            currentPromptType = Math.random() < 0.5 ? 'aspirated' : 'unaspirated';
            
            if (currentPromptType === 'aspirated') {
                promptText.innerText = "【有氣音 (h)】";
                promptText.style.color = "#E53935"; 
            } else {
                promptText.innerText = "【無氣音 (無h)】";
                promptText.style.color = "#1E88E5"; 
            }

            let words = [];
            let targetAmount = Math.floor(Math.random() * (wordCount / 2)) + 1; 
            targetRemaining = targetAmount;

            if (currentPromptType === 'aspirated') {
                words = words.concat(getRandomWords(aspiratedDB, targetAmount).map(w => ({...w, isTarget: true})));
                words = words.concat(getRandomWords(unaspiratedDB, wordCount - targetAmount).map(w => ({...w, isTarget: false})));
            } else {
                words = words.concat(getRandomWords(unaspiratedDB, targetAmount).map(w => ({...w, isTarget: true})));
                words = words.concat(getRandomWords(aspiratedDB, wordCount - targetAmount).map(w => ({...w, isTarget: false})));
            }

            words.sort(() => Math.random() - 0.5);

            // RWD 百分比半徑：讓半徑擴展一些，空出中間給老師提示面板
            const radius = window.innerWidth < 768 ? 38 : 42; 

            words.forEach((wordObj, index) => {
                const angle = (index / wordCount) * (2 * Math.PI) - (Math.PI / 2); 
                
                const x = 50 + radius * Math.cos(angle);
                const y = 50 + radius * Math.sin(angle);

                const bubble = document.createElement('div');
                bubble.className = 'word-bubble';
                // 使用 CSS variable 確保圓心對齊
                bubble.style.left = `calc(${x}% - var(--bubble-half))`;
                bubble.style.top = `calc(${y}% - var(--bubble-half))`;
                
                let htmlContent = '';
                if (showPOJ) htmlContent += `<div class="word-poj">${wordObj.p}</div>`;
                if (showHanzi) htmlContent += `<div class="word-hanzi">${wordObj.h}</div>`;
                bubble.innerHTML = htmlContent;

                const handleAction = (e) => {
                    e.preventDefault();
                    if (bubble.classList.contains('blown-away')) return; 
                    
                    if (wordObj.isTarget) {
                        playWind();
                        playCorrect();
                        bubble.classList.add('blown-away');
                        score += 10;
                        scoreEl.innerText = score;
                        targetRemaining--;
                        
                        if (targetRemaining <= 0) {
                            setTimeout(generateCircle, 600); 
                        }
                    } else {
                        playWrong();
                        score = Math.max(0, score - 5); 
                        scoreEl.innerText = score;
                        
                        bubble.classList.remove('shake');
                        void bubble.offsetWidth; 
                        bubble.classList.add('shake');
                    }
                };
                
                bubble.addEventListener('mousedown', handleAction);
                bubble.addEventListener('touchstart', handleAction);

                circleZone.appendChild(bubble);
            });
        }
    </script>
</body>
</html>
