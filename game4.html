<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 4：鼻腔共鳴大發電</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ECEFF1;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        /* Pe̍h-ōe-jī 結合字元防破圖保護罩 */
        .poj-text {
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0 !important;
            padding-right: 0.15em;
            display: inline-block;
        }

        /* 能量方塊響應式尺寸 */
        .energy-core {
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #FFFFFF; border: 4px solid #90A4AE;
            position: relative; overflow: hidden;
        }
        .energy-core:hover { transform: scale(1.03); }
        .energy-core:active { transform: scale(0.95); }

        /* 答對收集成功的電光動畫 */
        .charged {
            animation: chargeAnim 0.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes chargeAnim {
            0% { transform: scale(1); background: #FFF9C4; filter: brightness(1.2); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 答錯的震撼抖動 */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); border-color: #90A4AE; }
            20%, 60% { transform: translateX(-8px); border-color: #EF5350; background: #FFEBEE; }
            40%, 80% { transform: translateX(8px); border-color: #EF5350; background: #FFEBEE; }
        }

        /* 大大回饋標記 */
        .feedback-symbol {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; z-index: 50; pointer-events: none;
            animation: popFeedback 0.8s forwards;
        }
        @media (min-width: 768px) { .feedback-symbol { font-size: 10rem; } }
        @keyframes popFeedback {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.4); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white flex flex-col h-screen overflow-hidden">

    <div id="ui-layer" class="hidden shrink-0 bg-slate-800 border-b-4 border-slate-700 p-3 md:p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-4 md:gap-8">
            <div class="text-xl md:text-2xl font-black">⏱️ <span id="timer" class="text-yellow-400">60</span> 秒</div>
            <div class="text-xl md:text-2xl font-black">⚡ 電力：<span id="score" class="text-green-400">0</span> W</div>
        </div>
        <div class="flex gap-2">
            <button onclick="exitGame()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-xl font-bold text-sm md:text-base transition">❌ 跳出</button>
            <button id="btn-sound" onclick="toggleSound()" class="bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded-xl font-bold text-sm md:text-base transition">🔊 音效開</button>
        </div>
    </div>

    <div id="game-zone" class="flex-1 flex flex-col p-4 max-w-4xl w-full mx-auto justify-between gap-4 overflow-hidden relative">
        
        <div id="target-panel" class="hidden shrink-0 bg-amber-100 border-4 border-amber-400 text-slate-900 rounded-3xl p-4 md:p-6 shadow-xl flex flex-col items-center justify-center text-center mt-2">
            <div id="target-desc" class="text-lg md:text-2xl font-bold text-slate-600 mb-1">正在收集發電能源...</div>
            <div id="target-title" class="text-3xl md:text-5xl font-black text-blue-900 tracking-wide"></div>
        </div>

        <div id="core-grid" class="flex-1 grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-5 my-2 items-center justify-items-center w-full"></div>
    </div>

    <div id="start-screen" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[100] p-4 overflow-y-auto">
        <div class="bg-white/10 p-6 md:p-10 rounded-3xl backdrop-blur-md max-w-2xl w-full border border-white/10 shadow-2xl flex flex-col items-center my-auto">
            <h1 class="text-4xl md:text-5xl text-yellow-300 font-black mb-3 text-center drop-shadow-lg">⚡ 鼻腔共鳴大發電</h1>
            <p class="text-gray-300 text-base md:text-xl mb-8 text-center leading-relaxed">
                台語的鼻音分為許多共鳴位置！<br>請看清中央發電機的指令，點擊正確的鼻音字核輸送電力。
            </p>

            <div class="flex items-center gap-4 bg-white/10 p-3 md:p-4 rounded-full mb-8">
                <span class="text-white text-base md:text-xl font-bold ml-2">⏳ 遊戲時間：</span>
                <input type="number" id="game-duration" value="60" min="10" max="600" class="w-20 md:w-24 text-center text-lg md:text-xl font-black rounded-lg p-1 bg-white text-slate-900 border-none outline-none">
                <span class="text-white text-base md:text-xl font-bold mr-2">秒</span>
            </div>
            
            <div class="flex flex-wrap justify-center gap-4 w-full">
                <button onclick="checkAndStart(4)" class="flex-1 min-w-[140px] bg-green-500 hover:bg-green-600 text-white text-xl md:text-2xl font-black py-4 rounded-2xl shadow-[0_6px_0_#2E7D32] hover:translate-y-1 hover:shadow-[0_2px_0_#2E7D32] transition-all">新手電廠<br><span class="text-xs md:text-sm font-normal opacity-80">(盤面 4 個字)</span></button>
                <button onclick="checkAndStart(6)" class="flex-1 min-w-[140px] bg-orange-500 hover:bg-orange-600 text-white text-xl md:text-2xl font-black py-4 rounded-2xl shadow-[0_6px_0_#E65100] hover:translate-y-1 hover:shadow-[0_2px_0_#E65100] transition-all">標準電廠<br><span class="text-xs md:text-sm font-normal opacity-80">(盤面 6 個字)</span></button>
            </div>
        </div>
    </div>

    <div id="end-screen" class="hidden absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[100] p-4 text-center">
        <h1 class="text-6xl md:text-8xl text-yellow-400 font-black mb-4 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)]">發電結束！</h1>
        <p class="text-white text-xl md:text-3xl mb-10">您本次共成功輸送了 <strong id="final-score" class="text-5xl md:text-7xl text-green-400 mx-2">0</strong> 瓦特的綠色電力！</p>
        <button onclick="location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white text-2xl md:text-3xl font-black px-12 py-4 rounded-full shadow-[0_6px_0_#1565C0] hover:translate-y-1 hover:shadow-[0_2px_0_#1565C0] transition-all">再發一次電</button>
    </div>

    <script>
        // --- 四大鼻中共鳴題庫資料 ---
        const nasalDB = {
            m: [
                { p: 'am', h: '暗', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'im', h: '音', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'iam', h: '閹', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'sam', h: '三', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'sim', h: '心', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'kiam', h: '兼', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'tam', h: '淡', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'lim', h: '林', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'ham', h: '含', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' },
                { p: 'kam', h: '甘', hint: '💡 -m 結尾：唸完上下嘴唇要閉緊！' }
            ],
            n: [
                { p: 'an', h: '安', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'in', h: '印', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'un', h: '恩', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'ian', h: '燕', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'oan', h: '灣', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'pan', h: '班', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'sin', h: '新', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'tun', h: '鈍', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'tian', h: '電', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' },
                { p: 'koan', h: '關', hint: '💡 -n 結尾：舌尖要頂住門牙內側上顎！' }
            ],
            ng: [
                { p: 'ang', h: '翁', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'ong', h: '王', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'eng', h: '英', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'iong', h: '羊', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'oang', h: '汪', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'pang', h: '板', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'bong', h: '亡', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'teng', h: '燈', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'kiong', h: '恭', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' },
                { p: 'hong', h: '風', hint: '💡 -ng 結尾：張開嘴巴，氣流從喉嚨後方發出！' }
            ],
            nasalized: [
                { p: 'saⁿ', h: '三', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'siⁿ', h: '生', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'peⁿ', h: '平', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'cho͘ⁿ', h: '粗', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'āⁿ', h: '餡', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'īⁿ', h: '院', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'eⁿ', h: '嬰', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'o͘ⁿ', h: '喔', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'iaⁿ', h: '贏', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' },
                { p: 'oaⁿ', h: '鞍', hint: '💡 ⁿ 鼻化音：嘴型不變，把音連同鼻塞的氣一起哼出來！' }
            ]
        };

        const targetTypes = [
            { key: 'm', title: '閉嘴唇 [-m] 結尾', desc: '找出唸完後嘴唇要緊閉的字核！' },
            { key: 'n', title: '頂上顎 [-n] 結尾', desc: '找出舌尖頂住上顎門牙後方的字核！' },
            { key: 'ng', title: '發喉音 [-ng] 結尾', desc: '找出嘴巴張開、氣流由喉嚨後方送出的字核！' },
            { key: 'nasalized', title: '神奇鼻化小開關 [ⁿ]', desc: '找出右上角帶有小 ⁿ 、音從鼻腔哼出的字核！' }
        ];

        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let boardSize = 6; // 預設盤面核心數
        let currentTarget = null;
        let correctCountOnBoard = 0;

        // --- 音效引擎 (Web Audio API) ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [196.00, 220.00, 261.63, 293.66, 329.63, 261.63]; // 活潑的五聲音階
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            document.getElementById('btn-sound').className = soundEnabled 
                ? "bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded-xl font-bold text-sm md:text-base transition shadow"
                : "bg-gray-500 hover:bg-gray-600 text-white px-3 py-1.5 rounded-xl font-bold text-sm md:text-base transition shadow";
            
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval); bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); // E5
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16); // G5
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.35);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        // --- 核心遊戲控制流程 ---
        function checkAndStart(size) {
            boardSize = size;
            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) customDuration = 60;
            timeLeft = customDuration;

            initAudio();
            startGame();
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('target-panel').classList.remove('hidden');
            
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 250);
            }

            refreshRound();
        }

        function endGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('target-panel').classList.add('hidden');
            document.getElementById('core-grid').innerHTML = '';
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function exitGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            document.getElementById('core-grid').innerHTML = '';
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('target-panel').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function showFeedbackSymbol(symbol, colorStr) {
            const fb = document.createElement('div');
            fb.className = 'feedback-symbol';
            fb.innerText = symbol;
            fb.style.color = colorStr;
            fb.style.textShadow = "0px 0px 25px rgba(255,255,255,0.9)";
            document.getElementById('game-zone').appendChild(fb);
            setTimeout(() => fb.remove(), 800);
        }

        // --- 刷新局數與盤面核心 ---
        function refreshRound() {
            const grid = document.getElementById('core-grid');
            grid.innerHTML = '';

            // 隨機抽選一個目標鼻音型態
            currentTarget = targetTypes[Math.floor(Math.random() * targetTypes.length)];
            document.getElementById('target-title').innerText = currentTarget.title;
            document.getElementById('target-desc').innerText = `💡 任務指示：${currentTarget.desc}`;

            let finalChoices = [];
            // 分派正確答案與錯誤答案的比例
            let correctPool = [...nasalDB[currentTarget.key]].sort(() => Math.random() - 0.5);
            let targetCorrectCount = boardSize === 4 ? 2 : 2; // 每局固定發放 2 個正確答案
            correctCountOnBoard = targetCorrectCount;

            for (let i = 0; i < targetCorrectCount; i++) {
                finalChoices.push({ ...correctPool[i], isTarget: true });
            }

            // 抽選其餘的錯誤答案
            let wrongKeys = targetTypes.filter(t => t.key !== currentTarget.key).map(t => t.key);
            let wrongPool = [];
            wrongKeys.forEach(k => { wrongPool = wrongPool.concat(nasalDB[k]); });
            wrongPool.sort(() => Math.random() - 0.5);

            for (let i = 0; i < (boardSize - targetCorrectCount); i++) {
                finalChoices.push({ ...wrongPool[i], isTarget: false });
            }

            // 徹底打亂六大核心順序
            finalChoices.sort(() => Math.random() - 0.5);

            // 渲染 DOM 方塊
            finalChoices.forEach(item => {
                const card = document.createElement('div');
                // RWD 尺寸計算：在大螢幕與小螢幕下自適應高寬度
                card.className = "energy-core w-full h-24 md:h-36 rounded-2xl flex flex-col justify-center items-center p-2 shadow-md";
                
                let html = `<div class="poj-text text-3xl md:text-4xl text-blue-800 font-black">${item.p}</div>`;
                html += `<div class="text-gray-500 font-bold text-lg md:text-xl mt-1">${item.h}</div>`;
                card.innerHTML = html;

                const handlePress = (e) => {
                    e.preventDefault();
                    if (card.classList.contains('charged') || card.classList.contains('shake')) return;

                    if (item.isTarget) {
                        playCorrect();
                        card.classList.add('charged');
                        score += 50;
                        document.getElementById('score').innerText = score;
                        correctCountOnBoard--;
                        showFeedbackSymbol('⚡', '#00E676');

                        // 當這局的所有正確答案都被收集完畢，自動跳下一局
                        if (correctCountOnBoard <= 0) {
                            setTimeout(refreshRound, 400);
                        }
                    } else {
                        playWrong();
                        card.classList.add('shake');
                        score = Math.max(0, score - 20);
                        document.getElementById('score').innerText = score;
                        showFeedbackSymbol('❌', '#FF1744');
                        
                        // 動態修改中央提示框，給予精確的發音結構肢體引導
                        document.getElementById('target-desc').innerText = item.hint;
                        
                        setTimeout(() => card.classList.remove('shake'), 400);
                    }
                };

                card.addEventListener('mousedown', handlePress);
                card.addEventListener('touchstart', handlePress);

                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
