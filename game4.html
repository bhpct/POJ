<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 4：鼻音深夜食堂 (送餐大作戰)</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Noto Sans 確保中文字與白話字顯示乾淨現代 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0F172A; /* 深色食堂背景 */
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        /* POJ 白話字防切字型防護罩 */
        .poj-text {
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0 !important;
            padding-right: 0.15em;
            display: inline-block;
        }

        /* 食堂燈籠發光效果 */
        .lantern {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6), 0 0 5px rgba(239, 68, 68, 0.4);
        }

        /* 廚房出餐區木盤微幅震動 */
        .plate-bounce {
            animation: plateBounce 1.5s ease-in-out infinite alternate;
        }
        @keyframes plateBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        /* 食客吧檯點擊卡片 */
        .customer-seat {
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .customer-seat:hover { transform: translateY(-4px) scale(1.02); }
        .customer-seat:active { transform: scale(0.95); }

        /* 答對飛入食客嘴巴動畫 */
        .serve-animation {
            animation: serveFood 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }
        @keyframes serveFood {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.3) translateY(180px); opacity: 0; }
        }

        /* 答錯劇烈搖晃 */
        .wrong-shake {
            animation: wrongShake 0.4s ease-in-out;
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .feedback-pop {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; z-index: 100; pointer-events: none;
            animation: popSymbol 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popSymbol {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen justify-between">

    <!-- 頂部食堂狀態列 -->
    <div id="ui-layer" class="hidden shrink-0 bg-slate-900 border-b-2 border-amber-600 px-4 py-3 flex justify-between items-center z-50">
        <div class="flex items-center gap-4 md:gap-8">
            <div class="text-sm md:text-xl font-black text-white">⏱️ 營業時間：<span id="timer" class="text-yellow-400">60</span> 秒</div>
            <div class="text-sm md:text-xl font-black text-white">💰 小費：<span id="score" class="text-green-400">0</span> 元</div>
            <div class="text-sm md:text-xl font-black text-white">❤️ 生命：<span id="lives" class="text-red-400">❤️❤️❤️</span></div>
        </div>
        <div class="flex gap-2">
            <button onclick="exitGame()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm transition-transform active:scale-95">❌ 休息</button>
            <button id="btn-sound" onclick="toggleSound()" class="bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm transition-transform active:scale-95">🔊 音效</button>
        </div>
    </div>

    <!-- 主要遊戲畫面 -->
    <div id="game-zone" class="flex-1 relative w-full flex flex-col justify-between p-4 max-w-4xl mx-auto overflow-hidden">
        
        <!-- 頂部日式食堂裝飾：紅燈籠 -->
        <div id="decorations" class="hidden flex justify-around w-full shrink-0 z-10">
            <div class="lantern bg-red-600 text-white font-black px-3 py-1.5 rounded-b-lg border-2 border-red-700 text-xs md:text-sm">🏮 鼻</div>
            <div class="lantern bg-red-600 text-white font-black px-3 py-1.5 rounded-b-lg border-2 border-red-700 text-xs md:text-sm">🏮 音</div>
            <div class="lantern bg-red-600 text-white font-black px-3 py-1.5 rounded-b-lg border-2 border-red-700 text-xs md:text-sm">🏮 食</div>
            <div class="lantern bg-red-600 text-white font-black px-3 py-1.5 rounded-b-lg border-2 border-red-700 text-xs md:text-sm">🏮 堂</div>
        </div>

        <!-- 中部：出餐口 (出餐木盤，放著隨機單字) -->
        <div id="kitchen-spotlight" class="hidden flex-1 flex flex-col items-center justify-center gap-2 z-20 my-2">
            <div class="text-xs md:text-base font-bold text-amber-400 bg-slate-800/80 px-4 py-1.5 rounded-full border border-amber-600/30">
                🔔 廚房剛出餐！請判斷發音，送去給正確的食客：
            </div>

            <!-- 熱騰騰的木製餐盤 -->
            <div id="dish-plate" class="plate-bounce bg-amber-50 border-4 border-amber-800 shadow-[0_15px_30px_rgba(0,0,0,0.5)] rounded-[2.5rem] p-4 md:p-6 flex flex-col items-center justify-center min-w-[200px] md:min-w-[260px] text-center border-b-[10px]">
                <div id="dish-emoji" class="text-4xl md:text-6xl mb-2">🍣</div>
                <div id="word-poj" class="poj-text text-2xl md:text-4xl text-slate-800 font-black leading-none">àm</div>
                <div id="word-hanzi" class="text-sm md:text-xl font-bold text-slate-500 mt-1">暗</div>
            </div>
        </div>

        <!-- 錯誤提示大看板 (答錯時彈出) -->
        <div id="error-banner" class="hidden shrink-0 bg-red-950/95 border-4 border-red-500 text-white rounded-2xl p-3 md:p-4 text-center max-w-xl w-full mx-auto shadow-2xl z-40 zoom-in animate-pulse mb-2">
            <div class="text-base md:text-xl font-black text-red-300 mb-1">⚠️ 哎呀！客人不吃這盤菜喔</div>
            <p id="error-desc" class="text-xs md:text-base text-gray-200 font-bold leading-relaxed"></p>
        </div>

        <!-- 下部：吧檯食客座席 (點擊送餐) -->
        <div id="counter-area" class="hidden shrink-0 flex flex-col items-center w-full z-20 mb-2">
            <!-- 吧檯食客 row (手機版 2x2 網格，電腦版橫排座) -->
            <div id="customer-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full">
                <!-- 阿閉伯 -->
                <div onclick="serveFood('m')" class="customer-seat bg-slate-800 border-4 border-slate-600 hover:border-amber-400 p-3 rounded-2xl flex flex-col items-center text-center shadow-md relative" id="seat-m">
                    <div class="text-4xl md:text-6xl mb-1 transition-transform" id="avatar-m">🤐</div>
                    <div class="text-xs md:text-sm font-black text-amber-400">阿閉伯</div>
                    <div class="text-[10px] md:text-xs text-slate-300 mt-1 bg-slate-900/60 px-2 py-0.5 rounded-full font-bold">🤐 只吃閉嘴音 -m</div>
                </div>
                <!-- 舌尖妹 -->
                <div onclick="serveFood('n')" class="customer-seat bg-slate-800 border-4 border-slate-600 hover:border-amber-400 p-3 rounded-2xl flex flex-col items-center text-center shadow-md relative" id="seat-n">
                    <div class="text-4xl md:text-6xl mb-1 transition-transform" id="avatar-n">👅</div>
                    <div class="text-xs md:text-sm font-black text-amber-400">舌尖妹</div>
                    <div class="text-[10px] md:text-xs text-slate-300 mt-1 bg-slate-900/60 px-2 py-0.5 rounded-full font-bold">👅 只吃頂上顎 -n</div>
                </div>
                <!-- 大嘴王 -->
                <div onclick="serveFood('ng')" class="customer-seat bg-slate-800 border-4 border-slate-600 hover:border-amber-400 p-3 rounded-2xl flex flex-col items-center text-center shadow-md relative" id="seat-ng">
                    <div class="text-4xl md:text-6xl mb-1 transition-transform" id="avatar-ng">😮</div>
                    <div class="text-xs md:text-sm font-black text-amber-400">大嘴王</div>
                    <div class="text-[10px] md:text-xs text-slate-300 mt-1 bg-slate-900/60 px-2 py-0.5 rounded-full font-bold">😮 只吃發喉音 -ng</div>
                </div>
                <!-- 鼻塞弟 -->
                <div onclick="serveFood('nasalized')" class="customer-seat bg-slate-800 border-4 border-slate-600 hover:border-amber-400 p-3 rounded-2xl flex flex-col items-center text-center shadow-md relative" id="seat-nasalized">
                    <div class="text-4xl md:text-6xl mb-1 transition-transform" id="avatar-nasalized">👃</div>
                    <div class="text-xs md:text-sm font-black text-amber-400">鼻塞弟</div>
                    <div class="text-[10px] md:text-xs text-slate-300 mt-1 bg-slate-900/60 px-2 py-0.5 rounded-full font-bold">👃 只吃鼻化音 ⁿ</div>
                </div>
            </div>
        </div>

    </div>

    <!-- 開始選單 -->
    <div id="start-screen" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[100] p-4 overflow-y-auto">
        <div class="bg-white/10 p-6 md:p-10 rounded-3xl backdrop-blur-md max-w-4xl w-full border border-white/10 shadow-2xl flex flex-col items-center my-auto">
            <h1 class="text-4xl md:text-6xl text-yellow-300 font-black mb-3 text-center drop-shadow-lg">🍜 鼻音深夜食堂</h1>
            <p class="text-gray-300 text-lg md:text-2xl mb-8 text-center font-bold">
                這是一堂考驗「送餐小弟」反應的台語營業課！<br>看準出餐口剛出爐的菜色，將它精確送交到正確嘴型特徵的饕客手中！
            </p>
            
            <div class="w-full bg-white/20 p-4 md:p-6 rounded-2xl mb-6">

                <div class="flex flex-wrap justify-center gap-4 md:gap-6 mb-6">
                    <label class="flex items-center gap-3 cursor-pointer bg-blue-900/50 hover:bg-blue-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-poj" checked class="w-6 h-6 md:w-8 md:h-8 accent-blue-500">
                        <span class="text-white text-lg md:text-2xl font-bold">白話字 (POJ)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer bg-green-900/50 hover:bg-green-800/80 p-3 md:p-4 rounded-xl transition">

                        <span class="text-white text-lg md:text-2xl font-bold">漢字</span>
                    </label>
                </div>

            </div>

            <div class="flex items-center gap-4 bg-white/20 p-3 md:p-4 rounded-full mb-8">
                <span class="text-white text-lg md:text-2xl font-bold ml-2">⏳ 營業挑戰時間：</span>
                <input type="number" id="game-duration" value="60" min="10" max="600" class="w-20 md:w-24 text-center text-xl md:text-2xl font-black rounded-lg p-1 bg-white text-slate-900 border-none outline-none">
                <span class="text-white text-lg md:text-2xl font-bold mr-2">秒</span>
            </div>
            
            <button onclick="checkAndStart()" class="w-full max-w-md bg-orange-500 hover:bg-orange-600 text-white text-2xl md:text-4xl font-black py-5 rounded-2xl shadow-[0_6px_0_#E65100] hover:translate-y-1 hover:shadow-[0_2px_0_#E65100] transition-all">🍽️ 送餐大作戰開張！</button>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="hidden absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[100] p-4 text-center">

        <p class="text-white text-xl md:text-3xl mb-10">食堂送餐小弟任務結束！賺取小費總額：<strong id="final-score" class="text-5xl md:text-7xl text-green-400 mx-2">0</strong> 元</p>

    </div>

            { key: 'nasalized', name: '鼻塞弟 👃', avatar: '👃', text: '「哼哼（鼻音）～我想吃帶有小 [ⁿ] 的鼻化音食物！」' }
        ];

        let score = 0;
        let lives = 3;
        let timeLeft = 60;
        let gameInterval = null;
        let currentTargetKey = null; // 本局目標分類 (m, n, ng, nasalized)
        let currentDish = null;     // 本局出餐的食物資料

        // --- 音效引擎 ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [261.63, 329.63, 392.00, 440.00, 392.00, 329.63]; // 活潑旋律
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            document.getElementById('btn-sound').className = soundEnabled 
                ? "bg-teal-500 hover:bg-teal-600 text-white px-2.5 py-1.5 rounded-xl font-bold text-xs md:text-sm transition-transform active:scale-95 shadow"
                : "bg-gray-500 hover:bg-gray-600 text-white px-2.5 py-1.5 rounded-xl font-bold text-xs md:text-sm transition-transform active:scale-95 shadow";
            
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval); bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function playEat() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        // --- 核心流程控制 ---
        function checkAndStart() {
            showPOJ = document.getElementById('opt-poj').checked;
            showHanzi = document.getElementById('opt-hanzi').checked;

            if (!showPOJ && !showHanzi) {
                document.getElementById('error-msg').innerText = "⚠️ 請至少勾選一種顯示模式！";
                return;
            }
            document.getElementById('error-msg').innerText = "";

            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) customDuration = 60;
            timeLeft = customDuration;

            initAudio();
            startGame();
        }

        function updateLivesUI() {
            let heartStr = '';
            for(let i=0; i<3; i++) {
                heartStr += (i < lives) ? '❤️' : '🖤';
            }
            document.getElementById('lives').innerText = heartStr;
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('decorations').classList.remove('hidden');
            document.getElementById('decorations').classList.add('flex');
            document.getElementById('kitchen-spotlight').classList.remove('hidden');
            document.getElementById('kitchen-spotlight').classList.add('flex');
            document.getElementById('counter-area').classList.remove('hidden');
            document.getElementById('counter-area').classList.add('flex');

            score = 0; lives = 3;
            document.getElementById('score').innerText = score;
            updateLivesUI();
            document.getElementById('timer').innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);

            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 250);
            }

            nextOrder();
        }

        function endGame(isDead) {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }

            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('decorations').classList.add('hidden');
            document.getElementById('kitchen-spotlight').classList.add('hidden');
            document.getElementById('kitchen-spotlight').classList.remove('flex');
            document.getElementById('counter-area').classList.add('hidden');
            document.getElementById('counter-area').classList.remove('flex');
            document.getElementById('error-banner').classList.add('hidden');

            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            const endTitle = document.getElementById('end-title');
            if (isDead) {
                endTitle.innerText = "💀 食堂歇業！";
                endTitle.style.color = "#EF4444";
            } else {
                endTitle.innerText = "⏳ 挑戰結束！";
                endTitle.style.color = "#FBBF24";
            }
        }

        function exitGame() {
            clearInterval(gameInterval);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }

            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('decorations').classList.add('hidden');
            document.getElementById('kitchen-spotlight').classList.add('hidden');
            document.getElementById('kitchen-spotlight').classList.remove('flex');
            document.getElementById('counter-area').classList.add('hidden');
            document.getElementById('counter-area').classList.remove('flex');
            document.getElementById('error-banner').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function showPopEffect(text, colorStr) {
            const pop = document.createElement('div');
            pop.className = 'feedback-pop';
            pop.innerText = text;
            pop.style.color = colorStr;
            pop.style.textShadow = "0px 0px 20px rgba(255,255,255,0.9)";
            document.getElementById('game-zone').appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        // --- 食堂廚房出餐邏輯 (隨機出一盤菜) ---
        function nextOrder() {
            document.getElementById('error-banner').classList.add('hidden');
            
            // 恢復所有食客頭像為原始狀態，並移除動畫殘留
            diners.forEach(d => {
                const avatar = document.getElementById(`avatar-${d.key}`);
                const seat = document.getElementById(`seat-${d.key}`);
                avatar.innerText = d.avatar;
                avatar.className = "text-4xl md:text-6xl mb-1 transition-transform";
                seat.className = "customer-seat bg-slate-800 border-4 border-slate-600 hover:border-amber-400 p-3 rounded-2xl flex flex-col items-center text-center shadow-md relative";
            });

            // 1. 隨機決定本局目標鼻音分類
            const targetDiner = diners[Math.floor(Math.random() * diners.length)];
            currentTargetKey = targetDiner.key;

            // 2. 從該分類抽取一道食物單字
            const wordPool = nasalDB[currentTargetKey];
            currentDish = wordPool[Math.floor(Math.random() * wordPool.length)];

            // 3. 隨機選一個食物 Emoji 給木盤裝飾
            const foodEmojis = ['🍣', '🍜', '🍱', '🍡', '🥟', '🍘', '🍙', '🍛', '🍢'];
            const randomFood = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];

            // 4. 更新廚房出餐盤內容
            document.getElementById('dish-emoji').innerText = randomFood;
            document.getElementById('word-poj').innerText = showPOJ ? currentDish.p : '';
            document.getElementById('word-hanzi').innerText = showHanzi ? currentDish.h : '';
            
            // 移除出餐盤的飛行和抖動
            const dishPlate = document.getElementById('dish-plate');
            dishPlate.className = "plate-bounce bg-amber-50 border-4 border-amber-800 shadow-[0_15px_30px_rgba(0,0,0,0.5)] rounded-[2.5rem] p-4 md:p-6 flex flex-col items-center justify-center min-w-[200px] md:min-w-[260px] text-center border-b-[10px]";
        }

        // --- 點擊食客卡片進行送餐判定 ---
        function serveFood(clickedKey) {
            if (document.getElementById('ui-layer').classList.contains('hidden') || lives <= 0) return;

            const dishPlate = document.getElementById('dish-plate');
            const targetAvatar = document.getElementById(`avatar-${clickedKey}`);
            const targetSeat = document.getElementById(`seat-${clickedKey}`);

            if (clickedKey === currentTargetKey) {
                // A. 送餐成功！
                playEat();
                playCorrect();
                
                // 動態飛入食客嘴巴動畫
                dishPlate.className = "serve-animation bg-amber-50 border-4 border-amber-800 shadow-[0_15px_30px_rgba(0,0,0,0.5)] rounded-[2.5rem] p-4 md:p-6 flex flex-col items-center justify-center min-w-[200px] md:min-w-[260px] text-center border-b-[10px]";
                
                targetAvatar.innerText = '😋'; // 吃飽開心的表情
                targetAvatar.className = "text-4xl md:text-6xl mb-1 bounce-avatar";
                targetSeat.className = "customer-seat bg-green-950 border-4 border-green-400 p-3 rounded-2xl flex flex-col items-center text-center shadow-lg scale-105 relative";

                showPopEffect('Hó-chia̍h! 💖', '#4CAF50');
                score += 100;
                document.getElementById('score').innerText = score;

                // 停留一秒給吃飽反饋，再出下一道菜
                setTimeout(nextOrder, 1000);
            } else {
                // B. 送錯餐點了！
                playWrong();
                targetAvatar.innerText = '🤢'; // 噎到不舒服的表情
                targetSeat.classList.add('wrong-shake');

                showPopEffect('❌ 哼！', '#FF1744');
                lives--;
                updateLivesUI();

                // 顯示出餐口木盤裝載單字的專屬嘴型教育回饋提示
                document.getElementById('error-desc').innerText = currentDish.hint;
                document.getElementById('error-banner').classList.remove('hidden');

                if (lives <= 0) {
                    setTimeout(() => endGame(true), 1200);
                } else {
                    // 答錯保留在原地，可以讓玩家重新選擇正確的人送餐，直到成功才跳下一題！
                    setTimeout(() => {
                        targetAvatar.innerText = diners.find(d => d.key === clickedKey).avatar;
                        targetSeat.classList.remove('wrong-shake');
                    }, 1200);
                }
            }
        }
    </script>
</body>
</html>
