<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 5：急煞車大對決</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Noto Sans 確保中文字與白話字顯示乾淨現代 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0F172A; /* 深邃夜星空 */
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        /* 完美防護白話字體設定 */
        .poj-text { 
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0 !important;
            padding-right: 0.15em;
            display: inline-block;
        }

        /* 蒸汽粒子噴發效果 */
        .steam-particle {
            position: absolute; pointer-events: none;
            animation: steamRise 0.8s ease-out forwards;
            font-size: 1.5rem; z-index: 40;
        }
        @keyframes steamRise {
            0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(-30px, -60px) scale(1.5); opacity: 0; }
        }

        /* 撞車劇烈抖動動畫 */
        .crash-shake {
            animation: crashShakeAnim 0.5s ease-in-out;
        }
        @keyframes crashShakeAnim {
            0%, 100% { transform: translateX(0) translateY(0); }
            10%, 50%, 90% { transform: translateX(-10px) translateY(-5px); }
            30%, 70% { transform: translateX(10px) translateY(5px); }
        }

        /* 軌道警告線條（紅白斑馬線流動） */
        .warning-track {
            background: repeating-linear-gradient(
                -45deg,
                rgba(239, 68, 68, 0.2),
                rgba(239, 68, 68, 0.2) 10px,
                rgba(255, 255, 255, 0.1) 10px,
                rgba(255, 255, 255, 0.1) 20px
            );
        }

        /* 槓桿閘門旋轉與定位 */
        #gate-bar {
            transform-origin: bottom left;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen justify-between">

    <!-- 頂部 HUD 面板 (標題完美置中 RWD 設計) -->

        </div>

        <!-- 中間：常駐遊戲大標題 (在手機版自動換行，電腦版置中) -->

            🚂 急煞車大對決

        </div>
    </div>

                { p: 'bat', h: '識/會', type: 'stop', category: 't', hint: '-t 結尾：舌尖頂上顎！(像一 it 一樣煞車)' }
            ],
            ng_k: [
                { p: 'âng', h: '紅', type: 'nasal', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'ak', h: '沃', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'ông', h: '王', type: 'nasal', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'ok', h: '惡', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'eng', h: '英', type: 'nasal', category: 'k', hint: '-k 結尾/像竹 tek 一樣煞車)' },
                { p: 'ek', h: '億', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'khang', h: '空/洞', type: 'nasal', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'khak', h: '殼', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'lang', h: '隔開', type: 'nasal', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'lak', h: '掉落', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'kóng', h: '講', type: 'nasal', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'kok', h: '國', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'teng', h: '燈', type: 'nasal', category: 'k', hint: '-k 結尾/像竹 tek 一樣煞車)' },
                { p: 'tek', h: '竹', type: 'stop', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'kiông', h: '強', type: 'nasal', category: 'k', hint: '-k 結尾：喉嚨卡住！(像竹 tek 一樣煞車)' },
                { p: 'kio̍k', h: '局', type: 'stop', category: 'k', hint: '-k 結尾/像竹 tek 一樣煞車)' }
            ]
        };

        // 遊戲流程控制變數
        let score = 0;
        let lives = 3;
        let trainSpeed = 0.4; // 火車速度 (由難度控制：0.25慢 / 0.4普 / 0.6快)
        let activePool = [];
        let currentTrainWord = null;
        let trainPosition = 100; // 火車 X 座標百分比 (從 100% 往左行駛到 -20%)
        
        let showPOJ = true;
        let showHanzi = true;

        let animationFrameId = null;
        let trainInterval = null;
        let activeBrake = false; // 是否在本次火車過程中按過煞車
        let roundProcessed = false; // 本回合是否完成結算

        // 警戒煞車區範圍 (18% 至 33%)
        const minBrakeZone = 18;
        const maxBrakeZone = 33;
        const gatePosition = 15; // 閘門固定在 15%

        const trainSprite = document.getElementById('train-sprite');
        const feedbackBanner = document.getElementById('feedback-banner');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackDesc = document.getElementById('feedback-desc');
        const gateBar = document.getElementById('gate-bar');

        // --- 音效引擎 (Web Audio API) ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [130.81, 146.83, 164.81, 146.83]; // 低沉沉穩的火車行進節奏
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            document.getElementById('btn-sound').className = soundEnabled 
                ? "bg-teal-500 hover:bg-teal-600 text-white px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm transition-transform active:scale-95"
                : "bg-gray-500 hover:bg-gray-600 text-white px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm transition-transform active:scale-95";
            
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval); bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 350);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playBrakeSqueal() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playSlamSound() {
            if (!soundEnabled || !audioCtx) return;
            // 金屬關閉重音
            const osc1 = audioCtx.createOscillator(); const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc2.type = 'triangle'; osc2.frequency.setValueAtTime(60, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
            osc1.start(); osc2.start();
            osc1.stop(audioCtx.currentTime + 0.4); osc2.stop(audioCtx.currentTime + 0.4);
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playCrash() {
            if (!soundEnabled || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.5);
        }

        // --- 核心遊戲流程 ---
        function checkAndStart(speed) {
            trainSpeed = speed;
            showPOJ = document.getElementById('opt-poj').checked;
            showHanzi = document.getElementById('opt-hanzi').checked;

            const isMP = document.getElementById('opt-mp').checked;
            const isNT = document.getElementById('opt-nt').checked;
            const isNGK = document.getElementById('opt-ngk').checked;

            activePool = [];
            if (isMP) activePool = activePool.concat(wordPool.m_p);
            if (isNT) activePool = activePool.concat(wordPool.n_t);
            if (isNGK) activePool = activePool.concat(wordPool.ng_k);

            if (!showPOJ && !showHanzi) {
                document.getElementById('error-msg').innerText = "⚠️ 請至少勾選一種顯示模式！";
                return;
            }
            if (activePool.length === 0) {
                document.getElementById('error-msg').innerText = "⚠️ 請至少勾選一種訓練嘴型關卡！";
                return;
            }
            document.getElementById('error-msg').innerText = "";

            initAudio();
            startGame();
        }

        function updateLivesUI() {
            let heartStr = '';
            for(let i=0; i<3; i++) {
                heartStr += (i < lives) ? '❤️' : '🖤';
            }
            document.getElementById('lives').innerText = heartStr;
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('ui-layer').classList.add('flex');
            document.getElementById('hint-banner').classList.remove('hidden');
            
            score = 0; lives = 3;
            document.getElementById('score').innerText = score;
            updateLivesUI();

            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) customDuration = 60;
            timeLeft = customDuration;
            document.getElementById('timer').innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) endGame(false);
            }, 1000);

            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 350);
            }

            spawnTrain();
        }

        function endGame(isDead) {
            clearInterval(gameInterval);
            cancelAnimationFrame(animationFrameId);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('flex');
            document.getElementById('hint-banner').classList.add('hidden');
            feedbackBanner.classList.add('hidden');
            
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            const endTitle = document.getElementById('end-title');
            if (isDead) {
                endTitle.innerText = "💀 列車出軌！";
                endTitle.style.color = "#EF4444";
            } else {
                endTitle.innerText = "⏳ 挑戰時間到！";
                endTitle.style.color = "#FBBF24";
            }
        }

        function exitGame() {
            clearInterval(gameInterval);
            cancelAnimationFrame(animationFrameId);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('flex');
            document.getElementById('hint-banner').classList.add('hidden');
            feedbackBanner.classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- 生成下一輛火車 ---
        function spawnTrain() {
            roundProcessed = false;
            activeBrake = false;
            trainPosition = 100;

            // 分流題庫，依比例抽選：65% 出現入聲字，35% 出現鼻音字
            const stopPool = activePool.filter(w => w.type === 'stop');
            const nasalPool = activePool.filter(w => w.type === 'nasal');

            if (Math.random() < 0.65 && stopPool.length > 0) {
                currentTrainWord = stopPool[Math.floor(Math.random() * stopPool.length)];
            } else if (nasalPool.length > 0) {
                currentTrainWord = nasalPool[Math.floor(Math.random() * nasalPool.length)];
            } else {
                currentTrainWord = activePool[Math.floor(Math.random() * activePool.length)];
            }
            
            // 更新火車 UI
            document.getElementById('word-poj').innerText = showPOJ ? currentTrainWord.p : '';
            document.getElementById('word-hanzi').innerText = showHanzi ? currentTrainWord.h : '';
            trainSprite.classList.remove('crash-shake');

            // 確保閘門是開啟狀態 (旋轉 -90 度)
            gateBar.style.transform = 'rotate(-90deg)';
            
            // 隱藏上一局的錯誤提示
            feedbackBanner.classList.add('hidden');

            moveTrain();
        }

        // --- 蒸汽噴出視覺粒子效果 ---
        function spawnSteam() {
            const container = document.getElementById('game-zone');
            const rect = trainSprite.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            // 計算車頭煙囪大約位置
            const x = rect.left - containerRect.left + 15;
            const y = rect.top - containerRect.top + 20;

            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'steam-particle';
                    particle.innerText = '💨';
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    container.appendChild(particle);
                    setTimeout(() => particle.remove(), 800);
                }, i * 150);
            }
        }

        // --- 物理運動引擎 (Train Motion Loop) ---
        function moveTrain() {
            if (roundProcessed || document.getElementById('ui-layer').classList.contains('hidden')) return;

            trainPosition -= trainSpeed;
            trainSprite.style.left = `${trainPosition}%`;

            // A. 防守方失誤判定：錯過了急煞時間 (火車已經開過了閘門 15%)
            if (trainPosition <= gatePosition) {
                roundProcessed = true;
                if (currentTrainWord.type === 'stop') {
                    // 入聲字竟然沒煞車 ➔ 撞車扣血！
                    triggerWrongPenalty(currentTrainWord.hint);
                } else {
                    // 鼻音字本來就該放行 ➔ 完美安全過關！
                    playCorrect();
                    score += 50;
                    document.getElementById('score').innerText = score;
                    
                    // 火車開到最左邊淡出後更新
                    setTimeout(spawnTrain, 400);
                }
                return;
            }

            animationFrameId = requestAnimationFrame(moveTrain);
        }

        // --- 錯誤懲罰與嘴型教育引導 ---
        function triggerWrongPenalty(hintText) {
            playCrash();
            lives--;
            updateLivesUI();
            
            trainSprite.classList.add('crash-shake');
            
            // 顯示即時教學回饋
            feedbackTitle.innerText = "🛑 碰撞警報！發音未閉鎖";
            feedbackDesc.innerText = hintText;
            feedbackBanner.classList.remove('hidden');

            if (lives <= 0) {
                setTimeout(() => endGame(true), 1200);
            } else {
                setTimeout(spawnTrain, 2000); // 留2秒給學生看嘴型提示
            }
        }

        // --- 急煞拉桿觸控按鈕觸發 ---
        function pressBrake() {
            initAudio();
            if (roundProcessed || activeBrake || document.getElementById('ui-layer').classList.contains('hidden')) return;

            activeBrake = true;
            cancelAnimationFrame(animationFrameId);

            // 關閉閘門動畫 (旋轉至 0度)
            gateBar.style.transform = 'rotate(0deg)';
            playSlamSound();

            // 判斷火車此時的 X 座標是否在 18% ~ 33% 的警戒區內
            if (trainPosition >= minBrakeZone && trainPosition <= maxBrakeZone) {
                // 1. 煞車時機正確！
                if (currentTrainWord.type === 'stop') {
                    // 這確實是入聲字 ➔ 完美拦截，答對！
                    roundProcessed = true;
                    playBrakeSqueal();
                    playCorrect();
                    spawnSteam(); // 噴出急煞蒸汽
                    
                    score += 100;
                    document.getElementById('score').innerText = score;

                    setTimeout(() => {
                        // 緩慢開起閘門，火車開走
                        gateBar.style.transform = 'rotate(-90deg)';
                        spawnTrain();
                    }, 1000);
                } else {
                    // 點錯了：這是流暢的鼻音 ➔ 閘門關閉撞毀鼻音列車！
                    roundProcessed = true;
                    triggerWrongPenalty("這是不用急煞的鼻音，聲音要流暢拉長放行喔！");
                }
            } else {
                // 2. 煞車時機不對 (太早或太遲)
                roundProcessed = true;
                if (trainPosition > maxBrakeZone) {
                    triggerWrongPenalty("太早煞車了！火車還沒開進煞車警戒區喔！");
                } else {
                    triggerWrongPenalty("太晚煞車了！已經來不及擋下火車了！");
                }
            }
        }
