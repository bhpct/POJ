<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>母音氣球升空賽 V2</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #game-container { display: flex; width: 100vw; height: 100vh; position: relative; }
        .play-zone { flex: 1; position: relative; height: 100%; }
        #left-zone { background-color: #E3F2FD; border-right: 4px dashed #90CAF9; }
        #right-zone { background-color: #FFF3E0; }

        #ui-layer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 40px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 32px; font-weight: bold;
        }

        /* 移除原本的標籤樣式，僅保留透明背景提示 */
        .zone-title {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 30px; color: rgba(0,0,0,0.1); font-weight: bold; pointer-events: none;
        }

        .balloon {
            position: absolute; width: 140px; height: 170px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; font-weight: bold; color: white;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 3px 5px 15px rgba(0,0,0,0.3);
            cursor: pointer; bottom: -200px;
        }
        
        .balloon::after {
            content: ''; position: absolute; bottom: -12px; left: 50%;
            transform: translateX(-50%); border-left: 12px solid transparent;
            border-right: 12px solid transparent; border-bottom: 18px solid rgba(0,0,0,0.1);
        }

        @keyframes floatUp { 0% { bottom: -200px; } 100% { bottom: 110vh; } }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        .overlay h1 { font-size: 70px; margin-bottom: 10px; }
        .overlay p { font-size: 30px; margin-bottom: 30px; color: #ddd; }
        
        .btn {
            font-size: 32px; padding: 15px 40px; margin: 10px; border: none;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-easy { background: #81C784; color: white; }
        .btn-normal { background: #FFB74D; color: white; }
        .btn-hard { background: #E57373; color: white; }

        .feedback {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; font-weight: bold; z-index: 150; animation: popFeedback 0.8s forwards;
        }
        @keyframes popFeedback {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer" class="hidden">
            <div>⏱️ <span id="timer">60</span></div>
            <div>🏆 <span id="score">0</span></div>
        </div>
        <div id="left-zone" class="play-zone"><div class="zone-title">出題區</div></div>
        <div id="right-zone" class="play-zone"><div class="zone-title">答題區</div></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>母音氣球升空賽 V2</h1>
        <p>左邊出題、右邊答題，看誰反應快！</p>
        <div style="display: flex;">
            <button class="btn btn-easy" onclick="startGame(10)">簡單 (10秒)</button>
            <button class="btn btn-normal" onclick="startGame(6)">普通 (6秒)</button>
            <button class="btn btn-hard" onclick="startGame(3.5)">挑戰 (3.5秒)</button>
        </div>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1>時間到！</h1>
        <p>合作答對總數：<strong id="final-score" style="color: #FFD700; font-size: 60px;">0</strong></p>
        <button class="btn btn-normal" onclick="location.reload()">重新開始</button>
    </div>

    <script>
        const vowels = ['a', 'i', 'u', 'e', 'o', 'o͘'];
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#F1948A'];
        
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let floatSpeed = 6;
        let currentTargetVowel = '';
        let phaseTimeout;
        
        // 核心機制：追蹤每個字的答對次數，用來降低出現機率
        let vowelStats = { 'a': 0, 'i': 0, 'u': 0, 'e': 0, 'o': 0, 'o͘': 0 };

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const leftZone = document.getElementById('left-zone');
        const rightZone = document.getElementById('right-zone');

        function startGame(speed) {
            floatSpeed = speed;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            startLeftPhase();
        }

        function endGame() {
            clearInterval(gameInterval);
            clearTimeout(phaseTimeout);
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        // 加權隨機：答對次數越多，權重越低
        function getWeightedVowels(count) {
            let pool = [];
            vowels.forEach(v => {
                // 基礎權重為 10，每答對一次減 2 (最低保留 1，避免完全不出現)
                let weight = Math.max(1, 10 - (vowelStats[v] * 2));
                for(let i=0; i<weight; i++) pool.push(v);
            });
            
            // 從權重池中隨機抽取不重複的字
            let results = [];
            while(results.length < count) {
                let pick = pool[Math.floor(Math.random() * pool.length)];
                if(!results.includes(pick)) results.push(pick);
            }
            return results;
        }

        function createBalloon(vowel, colIndex, totalCols, isRightZone, onClick) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.innerText = vowel;
            b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 避免疊加：將區域水平平分為 colIndex 欄位，並加上微調
            let colWidth = 100 / totalCols;
            let randomOffset = (Math.random() * (colWidth * 0.4)); // 欄位內的小抖動
            b.style.left = (colIndex * colWidth + 5 + randomOffset) + '%';
            
            // 避免疊加：垂直啟動時間交錯 (Stagger)
            let staggerDelay = isRightZone ? (colIndex * 0.2) : (colIndex * 0.3);
            b.style.animation = `floatUp ${floatSpeed}s linear ${staggerDelay}s forwards`;

            const handleEvent = (e) => { e.preventDefault(); onClick(); };
            b.addEventListener('mousedown', handleEvent);
            b.addEventListener('touchstart', handleEvent);
            return b;
        }

        function showFeedback(text, color) {
            const f = document.createElement('div');
            f.className = 'feedback';
            f.innerText = text; f.style.color = color;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);
        }

        function startLeftPhase() {
            leftZone.querySelectorAll('.balloon').forEach(b => b.remove());
            rightZone.querySelectorAll('.balloon').forEach(b => b.remove());
            clearTimeout(phaseTimeout);

            // 出題區：出現 3 個字，使用加權機制選擇
            let picks = getWeightedVowels(3);
            picks.forEach((v, i) => {
                const b = createBalloon(v, i, 3, false, () => {
                    clearTimeout(phaseTimeout);
                    currentTargetVowel = v;
                    startRightPhase();
                });
                leftZone.appendChild(b);
            });

            phaseTimeout = setTimeout(() => startLeftPhase(), (floatSpeed + 1) * 1000);
        }

        function startRightPhase() {
            leftZone.querySelectorAll('.balloon').forEach(b => b.remove());
            
            // 答題區：出現全部 6 個字，分散在 6 個欄位避免疊加
            let all = [...vowels].sort(() => Math.random() - 0.5);
            all.forEach((v, i) => {
                const b = createBalloon(v, i, 6, true, () => {
                    clearTimeout(phaseTimeout);
                    if (v === currentTargetVowel) {
                        score++;
                        scoreEl.innerText = score;
                        vowelStats[v]++; // 紀錄答對，該字下次出現機率會降低
                        showFeedback('⭕', '#4CAF50');
                    } else {
                        showFeedback('❌', '#F44336');
                    }
                    setTimeout(startLeftPhase, 600);
                });
                rightZone.appendChild(b);
            });

            phaseTimeout = setTimeout(() => startLeftPhase(), (floatSpeed + 1.5) * 1000);
        }
    </script>
</body>
</html>
