<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 1：母音氣球升空賽</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Noto Sans 確保中文字與白話字顯示乾淨現代 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #E3F2FD; /* 清新天空藍 */
            user-select: none; -webkit-user-select: none;
            touch-action: none; /* 防止手機瀏覽器滑動干擾遊戲 */
        }

        /* POJ 白話字專用字體：防止 o͘ 等結合字元破圖或被切到 */
        .poj-text {
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0 !important;
            padding-right: 0.15em;
            display: inline-block;
        }

        /* 遊戲區域佈局：手機上下，電腦左右 */
        #game-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        @media (min-width: 768px) {
            #game-container { flex-direction: row; }
        }

        .play-zone {
            position: relative;
            flex: 1;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #left-zone {
            background-color: #BBDEFB;
            border-bottom: 4px dashed #90CAF9;
        }
        @media (min-width: 768px) {
            #left-zone { border-bottom: none; border-right: 4px dashed #90CAF9; }
        }
        
        #right-zone { background-color: #90CAF9; }

        .zone-title {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(30, 136, 229, 0.15); /* text-blue-800/15 */
            font-weight: 900;
            pointer-events: none;
            text-align: center;
            z-index: 0;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            .zone-title { font-size: 5rem; }
        }

        /* 車道包裝器：確保氣球不會互相重疊或出界 */
        .balloon-wrapper {
            position: absolute;
            bottom: -20%; /* 從畫面下方外開始 */
            z-index: 10;
        }

        /* 升空動畫 */
        .floating {
            animation: floatUp linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-140vh); }
        }

        /* 氣球樣式與 RWD 尺寸 */
        .balloon {
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease-out;
            position: relative;
            /* 氣球微微搖擺特效 */
            animation: wiggle 3s ease-in-out infinite alternate;
        }
        
        @keyframes wiggle {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* 氣球綁線 */
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            width: 2px; height: 20px;
            background-color: rgba(0,0,0,0.5);
        }

        .balloon:active { transform: scale(0.9) !important; }
        
        /* 響應式氣球大小：全面調大 */
        .balloon-size { width: 75px; height: 100px; font-size: 2rem; }
        @media (min-width: 480px) { .balloon-size { width: 100px; height: 130px; font-size: 2.5rem; } }
        @media (min-width: 768px) { .balloon-size { width: 125px; height: 160px; font-size: 3.5rem; } }

        /* 破掉動畫 */
        .popped {
            transform: scale(1.5) !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        /* 大回饋符號 (⭕/❌) */
        .feedback-symbol {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            z-index: 100;
            pointer-events: none;
            animation: popFeedback 0.8s forwards;
        }
        @media (min-width: 768px) { .feedback-symbol { font-size: 12rem; } }

        @keyframes popFeedback {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 頂部 UI 面板 -->
        <div id="ui-layer" class="hidden absolute top-4 left-1/2 transform -translate-x-1/2 flex gap-3 md:gap-6 z-50 bg-white/95 px-4 md:px-8 py-2 md:py-3 rounded-full shadow-lg items-center w-max max-w-[95vw]">
            <div class="text-xl md:text-3xl font-black text-gray-800 flex items-center">⏱️ <span id="timer" class="ml-1 w-8 text-center text-blue-600">60</span></div>
            <div class="text-xl md:text-3xl font-black text-gray-800 flex items-center">🏆 <span id="score" class="ml-1 w-8 text-center text-orange-500">0</span></div>
            <button onclick="exitGame()" class="bg-red-500 hover:bg-red-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow">❌ 跳出</button>
            <button id="btn-sound" onclick="toggleSound()" class="bg-teal-500 hover:bg-teal-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow">🔊 音效開</button>
        </div>

        <div id="left-zone" class="play-zone">
            <div class="zone-title">出題區</div>
        </div>
        
        <div id="right-zone" class="play-zone">
            <div class="zone-title">答題區</div>
        </div>
    </div>

    <!-- 開始選單 -->
    <div id="start-screen" class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center z-[100] p-4 overflow-y-auto">
        <div class="bg-white/10 p-6 md:p-10 rounded-3xl backdrop-blur-md max-w-3xl w-full border border-white/20 shadow-2xl flex flex-col items-center my-auto">
            <h1 class="text-4xl md:text-6xl text-yellow-300 font-black mb-2 text-center drop-shadow-lg">🎈 母音氣球升空賽</h1>
            <p class="text-gray-200 text-lg md:text-2xl mb-8 text-center font-bold">點擊左側(上方)出題，再到右側(下方)找出相同的音！</p>
            
            <div class="w-full bg-white/20 p-4 md:p-6 rounded-2xl mb-6">
                <div class="text-xl md:text-2xl text-white font-bold mb-4 border-b border-white/30 pb-2">🎯 選擇題庫 (可複選)</div>
                <div class="flex flex-col sm:flex-row flex-wrap gap-4 md:gap-6 justify-center">
                    <label class="flex items-center gap-3 cursor-pointer bg-blue-900/50 hover:bg-blue-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="vowel-single" checked class="w-6 h-6 md:w-8 md:h-8 accent-blue-500">
                        <span class="text-white text-lg md:text-2xl font-bold">單母音 (a, i, u, e, o, o͘)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer bg-purple-900/50 hover:bg-purple-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="vowel-double" class="w-6 h-6 md:w-8 md:h-8 accent-purple-500">
                        <span class="text-white text-lg md:text-2xl font-bold">雙母音 (ai, au, oa...)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer bg-orange-900/50 hover:bg-orange-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="vowel-triple" class="w-6 h-6 md:w-8 md:h-8 accent-orange-500">
                        <span class="text-white text-lg md:text-2xl font-bold">三母音 (iau, oai)</span>
                    </label>
                </div>
                <div id="error-msg" class="text-red-300 font-bold text-lg md:text-xl text-center mt-3 h-6"></div>
            </div>

            <div class="flex items-center gap-4 bg-white/20 p-3 md:p-4 rounded-full mb-8">
                <span class="text-white text-lg md:text-2xl font-bold ml-2">⏳ 遊戲時間：</span>
                <input type="number" id="game-duration" value="60" min="10" max="600" class="w-20 md:w-24 text-center text-xl md:text-2xl font-black rounded-lg p-1 bg-white/90 text-blue-900 border-none outline-none">
                <span class="text-white text-lg md:text-2xl font-bold mr-2">秒</span>
            </div>
            
            <div class="flex flex-wrap justify-center gap-4 w-full">
                <button onclick="checkAndStart(3, 4)" class="flex-1 min-w-[140px] bg-green-500 hover:bg-green-600 text-white text-2xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#2E7D32] hover:translate-y-1 hover:shadow-[0_2px_0_#2E7D32] transition-all">簡單</button>
                <button onclick="checkAndStart(4, 5)" class="flex-1 min-w-[140px] bg-orange-500 hover:bg-orange-600 text-white text-2xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#E65100] hover:translate-y-1 hover:shadow-[0_2px_0_#E65100] transition-all">普通</button>
                <button onclick="checkAndStart(5, 6)" class="flex-1 min-w-[140px] bg-red-500 hover:bg-red-600 text-white text-2xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#C62828] hover:translate-y-1 hover:shadow-[0_2px_0_#C62828] transition-all">挑戰</button>
            </div>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="hidden absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-[100] p-4 text-center">
        <h1 class="text-6xl md:text-8xl text-yellow-400 font-black mb-4 drop-shadow-[0_0_15px_rgba(253,224,71,0.8)]">時間到！</h1>
        <p class="text-white text-2xl md:text-4xl mb-10">你總共拍破了 <strong id="final-score" class="text-6xl md:text-8xl text-green-400 mx-2">0</strong> 顆正確的氣球</p>
        <button onclick="location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white text-3xl font-black px-10 py-4 rounded-full shadow-[0_6px_0_#1565C0] hover:translate-y-1 hover:shadow-[0_2px_0_#1565C0] transition-all">再玩一次</button>
    </div>

    <script>
        // --- 題庫定義 (純白話字) ---
        const db_single = ['a', 'i', 'u', 'e', 'o', 'o͘'];
        const db_double = ['ai', 'au', 'ia', 'io', 'iu', 'ui', 'oa', 'oe'];
        const db_triple = ['iau', 'oai'];

        // 氣球顏色池
        const balloonColors = ['#EF5350', '#EC407A', '#AB47BC', '#7E57C2', '#5C6BC0', '#42A5F5', '#29B6F6', '#26C6DA', '#26A69A', '#66BB6A', '#9CCC65', '#D4E157', '#FFEE58', '#FFCA28', '#FFA726', '#FF7043'];

        let activeVowels = [];
        let vowelWeights = {}; // 記錄出現權重 (預設100)
        
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let leftCount = 3;
        let rightCount = 4;
        
        let floatSpeed = 5; // 升空速度(秒)
        let currentTargetVowel = '';
        let phaseTimeout;

        // --- 音效引擎 (Web Audio API) ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; 
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            document.getElementById('btn-sound').className = soundEnabled 
                ? "bg-teal-500 hover:bg-teal-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow"
                : "bg-gray-500 hover:bg-gray-600 text-white px-3 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow";
            
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval); bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playPop() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const leftZone = document.getElementById('left-zone');
        const rightZone = document.getElementById('right-zone');

        // 初始化權重系統
        function initWeights() {
            vowelWeights = {};
            activeVowels.forEach(v => { vowelWeights[v] = 100; });
        }

        // 權重隨機抽取器 (保證本次抽取內不重複)
        function getWeightedRandomVowels(count, excludeVowel = null) {
            let pool = activeVowels.filter(v => v !== excludeVowel);
            // 防呆：如果要求的數量大於可選池子，最多只能抽出池子的數量 (防重複核心)
            let actualCount = Math.min(count, pool.length);
            let results = [];

            for (let i = 0; i < actualCount; i++) {
                let totalWeight = pool.reduce((sum, v) => sum + vowelWeights[v], 0);
                if (totalWeight <= 0) break; // 異常保護
                
                let random = Math.random() * totalWeight;
                let currentWeight = 0;
                
                for (let j = 0; j < pool.length; j++) {
                    currentWeight += vowelWeights[pool[j]];
                    if (random <= currentWeight) {
                        results.push(pool[j]);
                        pool.splice(j, 1); // 將抽中的移出本次的暫存池，確保不重複
                        break;
                    }
                }
            }
            return results;
        }

        // --- 核心遊戲流程 ---
        function checkAndStart(lCount, rCount) {
            leftCount = lCount;
            rightCount = rCount;
            
            // 難度影響氣球上升速度 (增加鑑別度：簡單更慢、困難更快)
            if(lCount === 3) floatSpeed = 9;   // 簡單：9秒 (原本7秒)
            if(lCount === 4) floatSpeed = 6;   // 普通：6秒 (維持)
            if(lCount === 5) floatSpeed = 3.5; // 挑戰：3.5秒 (原本5秒)

            activeVowels = [];
            if (document.getElementById('vowel-single').checked) activeVowels = activeVowels.concat(db_single);
            if (document.getElementById('vowel-double').checked) activeVowels = activeVowels.concat(db_double);
            if (document.getElementById('vowel-triple').checked) activeVowels = activeVowels.concat(db_triple);

            if (activeVowels.length === 0) {
                document.getElementById('error-msg').innerText = "⚠️ 請至少勾選一種母音題庫！";
                return;
            }
            document.getElementById('error-msg').innerText = ""; 

            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) customDuration = 60;
            timeLeft = customDuration;

            initAudio();
            initWeights(); // 重置並啟動機率權重
            startGame();
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            
            score = 0; scoreEl.innerText = score;
            timerEl.innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--; timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            
            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
            
            startLeftPhase();
        }

        function endGame() {
            clearInterval(gameInterval); clearTimeout(phaseTimeout);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            document.getElementById('ui-layer').classList.add('hidden');
            leftZone.innerHTML = '<div class="zone-title text-blue-800/20 font-black">出題區</div>';
            rightZone.innerHTML = '<div class="zone-title text-blue-800/20 font-black">答題區</div>';
            
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function exitGame() {
            clearInterval(gameInterval); clearTimeout(phaseTimeout);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            leftZone.innerHTML = '<div class="zone-title text-blue-800/20 font-black">出題區</div>';
            rightZone.innerHTML = '<div class="zone-title text-blue-800/20 font-black">答題區</div>';
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // --- 氣球產生器 (防重疊車道設計) ---
        function createBalloon(text, index, totalCount, delay, isTargetMode, clickCallback) {
            const wrapper = document.createElement('div');
            wrapper.className = `balloon-wrapper floating`;
            
            // 完美劃分車道，氣球永遠待在自己的車道正中央，絕對防撞防出界
            const laneWidth = 100 / totalCount;
            wrapper.style.left = `${(index * laneWidth) + (laneWidth / 2)}%`;
            wrapper.style.animationDuration = floatSpeed + 's';
            wrapper.style.animationDelay = delay + 's';

            const b = document.createElement('div');
            b.className = `balloon balloon-size`;
            b.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            b.style.color = '#FFFFFF';
            b.style.textShadow = "2px 2px 4px rgba(0,0,0,0.5)";
            b.innerHTML = `<span class="poj-text">${text}</span>`;

            wrapper.appendChild(b);

            const handleInteract = (e) => {
                e.preventDefault();
                if (b.classList.contains('popped')) return;
                
                b.classList.add('popped');
                clickCallback();
            };

            // 事件綁在氣球本體上，精準判定點擊
            b.addEventListener('mousedown', handleInteract);
            b.addEventListener('touchstart', handleInteract);

            wrapper.addEventListener('animationend', () => {
                if(wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
            });

            return wrapper;
        }

        function showFeedback(text, colorStr) {
            const fb = document.createElement('div');
            fb.className = 'feedback-symbol';
            fb.innerText = text;
            fb.style.color = colorStr;
            fb.style.textShadow = "0px 0px 30px rgba(255,255,255,0.8)";
            document.body.appendChild(fb);
            setTimeout(() => fb.remove(), 800);
        }

        // --- 階段 1：左側/上方出題區 ---
        function startLeftPhase() {
            rightZone.innerHTML = '<div class="zone-title text-blue-800/20 font-black">答題區</div>'; 
            leftZone.innerHTML = '<div class="zone-title text-blue-800/20 font-black">請出題</div>';

            let actualLeftCount = Math.min(leftCount, activeVowels.length); // 確保不重複的最大數量
            let picks = getWeightedRandomVowels(actualLeftCount);
            
            // 隨機錯開上升的延遲時間 (避免水平切齊)
            let delayOrder = Array.from({length: actualLeftCount}, (_, i) => i).sort(() => Math.random() - 0.5);

            picks.forEach((v, i) => {
                let randomDelay = delayOrder[i] * 0.6;
                const wrapper = createBalloon(v, i, actualLeftCount, randomDelay, false, () => {
                    clearTimeout(phaseTimeout);
                    playPop();
                    currentTargetVowel = v;
                    startRightPhase();
                });
                leftZone.appendChild(wrapper);
            });

            phaseTimeout = setTimeout(() => {
                if (document.getElementById('ui-layer').classList.contains('hidden')) return;
                startLeftPhase(); 
            }, (floatSpeed + actualLeftCount * 0.6) * 1000);
        }

        // --- 階段 2：右側/下方答題區 ---
        function startRightPhase() {
            leftZone.innerHTML = `<div class="zone-title" style="color:#1E88E5;">尋找：<br><span class="poj-text" style="font-size:inherit;">${currentTargetVowel}</span></div>`;
            rightZone.innerHTML = '';

            let actualRightCount = Math.min(rightCount, activeVowels.length);
            
            // 取得其他混淆選項 (排除目前目標)
            let rightChoices = getWeightedRandomVowels(actualRightCount - 1, currentTargetVowel);
            rightChoices.push(currentTargetVowel); // 將目標加回選項中，保證有答案
            rightChoices.sort(() => Math.random() - 0.5); // 打亂順序

            let delayOrder = Array.from({length: rightChoices.length}, (_, i) => i).sort(() => Math.random() - 0.5);

            rightChoices.forEach((v, i) => {
                let randomDelay = delayOrder[i] * 0.6;
                const wrapper = createBalloon(v, i, rightChoices.length, randomDelay, true, () => {
                    clearTimeout(phaseTimeout);
                    if (v === currentTargetVowel) {
                        score++; scoreEl.innerText = score;
                        playCorrect();
                        showFeedback('⭕', '#4CAF50');
                        // 🌟 機率自適應：答對後大幅降低該母音下次出現的機率
                        vowelWeights[v] = Math.max(10, vowelWeights[v] - 35);
                    } else {
                        playWrong();
                        showFeedback('❌', '#F44336');
                    }
                    setTimeout(startLeftPhase, 600);
                });
                rightZone.appendChild(wrapper);
            });

            phaseTimeout = setTimeout(() => {
                if (document.getElementById('ui-layer').classList.contains('hidden')) return;
                playWrong();
                showFeedback('💨', '#9E9E9E'); 
                setTimeout(startLeftPhase, 600);
            }, (floatSpeed + rightChoices.length * 0.6) * 1000);
        }
    </script>
</body>
</html>
