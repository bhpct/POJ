<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>母音氣球升空賽 V6</title>
    <!-- 載入支援白話字特殊符號的 Google 雲端字體 Noto Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #game-container { display: flex; width: 100vw; height: 100vh; position: relative; }
        .play-zone { flex: 1; position: relative; height: 100%; }
        #left-zone { background-color: #E3F2FD; border-right: 4px dashed #90CAF9; }
        #right-zone { background-color: #FFF3E0; }

        #ui-layer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 40px; align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 40px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 32px; font-weight: bold;
        }

        .zone-title {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 30px; color: rgba(0,0,0,0.1); font-weight: bold; pointer-events: none;
        }

        .balloon {
            position: absolute; width: 140px; height: 170px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; font-weight: bold; color: white;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 3px 5px 15px rgba(0,0,0,0.3);
            cursor: pointer; bottom: -200px;
        }
        
        .balloon::after {
            content: ''; position: absolute; bottom: -12px; left: 50%;
            transform: translateX(-50%); border-left: 12px solid transparent;
            border-right: 12px solid transparent; border-bottom: 18px solid rgba(0,0,0,0.1);
        }

        @keyframes floatUp { 0% { bottom: -200px; } 100% { bottom: 110vh; } }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        .overlay h1 { font-size: 70px; margin-bottom: 10px; }
        .overlay p { font-size: 30px; margin-bottom: 30px; color: #ddd; }
        
        /* 題庫開關面板樣式 */
        .options-panel {
            display: flex; gap: 20px; margin-bottom: 20px; align-items: center;
        }
        .option-label {
            background: rgba(255,255,255,0.2); padding: 10px 25px;
            border-radius: 50px; font-size: 24px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .option-label:hover { background: rgba(255,255,255,0.3); }
        .option-label input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; }
        
        /* 時間輸入框樣式 */
        .time-input-container {
            background: rgba(255,255,255,0.4); padding: 10px 25px;
            border-radius: 50px; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; gap: 10px; border: 2px solid white;
        }
        .time-input-container input {
            font-size: 24px; width: 80px; text-align: center; font-weight: bold;
            border-radius: 10px; border: none; padding: 5px; font-family: inherit;
        }

        /* 錯誤提示 */
        .error-msg {
            color: #FFCDD2; font-size: 24px; font-weight: bold; height: 35px; margin-bottom: 10px;
        }

        .btn-group { display: flex; gap: 15px; }

        .btn {
            font-size: 32px; padding: 15px 40px; border: none;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s;
            font-family: inherit;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-easy { background: #81C784; color: white; }
        .btn-normal { background: #FFB74D; color: white; }
        .btn-hard { background: #E57373; color: white; }

        /* 跳出遊戲按鈕 */
        .btn-exit {
            background: #E57373; color: white; border: none; border-radius: 15px;
            padding: 8px 20px; font-size: 24px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-family: inherit; margin-left: 20px;
        }
        .btn-exit:hover { transform: scale(1.05); background: #ef5350; }

        .feedback {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 150px; font-weight: bold; z-index: 150; animation: popFeedback 0.8s forwards;
        }
        @keyframes popFeedback {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer" class="hidden">
            <div>⏱️ <span id="timer">60</span></div>
            <div>🏆 <span id="score">0</span></div>
            <button class="btn-exit" onclick="exitGame()">❌ 跳出</button>
            <button class="btn-exit" id="btn-sound" onclick="toggleSound()" style="background: #4DB6AC;">🔊 音效開</button>
        </div>
        <div id="left-zone" class="play-zone"><div class="zone-title">出題區</div></div>
        <div id="right-zone" class="play-zone"><div class="zone-title">答題區</div></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>🎈 母音氣球升空賽</h1>
        <p>左邊出題、右邊答題，看誰反應快！</p>
        
        <!-- 設定區 -->
        <div class="options-panel">
            <label class="option-label">
                <input type="checkbox" id="opt-single" checked> 單母音
            </label>
            <label class="option-label">
                <input type="checkbox" id="opt-double"> 雙母音
            </label>
            <label class="option-label">
                <input type="checkbox" id="opt-triple"> 三母音
            </label>
        </div>

        <div class="options-panel" style="margin-bottom: 10px;">
            <div class="time-input-container">
                遊戲時間: <input type="number" id="game-duration" value="60" min="10" max="600"> 秒
            </div>
        </div>
        
        <!-- 錯誤提示訊息區 (未選取任何題庫時顯示) -->
        <div id="error-msg" class="error-msg"></div>

        <div class="btn-group">
            <button class="btn btn-easy" onclick="checkAndStart(10)">簡單 (10秒)</button>
            <button class="btn btn-normal" onclick="checkAndStart(6)">普通 (6秒)</button>
            <button class="btn btn-hard" onclick="checkAndStart(3.5)">挑戰 (3.5秒)</button>
        </div>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1>時間到！</h1>
        <p>合作答對總數：<strong id="final-score" style="color: #FFD700; font-size: 60px;">0</strong></p>
        <button class="btn btn-normal" onclick="location.reload()">回主畫面重新設定</button>
    </div>

    <script>
        // 題庫資料 (根據課綱分類)
        const vowelDatabase = {
            single: ['a', 'i', 'u', 'e', 'o', 'o͘'],
            double: ['ai', 'au', 'ia', 'io', 'iu', 'ui', 'oa', 'oe'],
            triple: ['iau', 'oai']
        };
        
        let activeVowels = []; // 遊戲真正使用的題庫
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#F1948A'];
        
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let floatSpeed = 6;
        let currentTargetVowel = '';
        let phaseTimeout;
        let vowelStats = {};

        // --- 音效合成系統 (免載入外部檔案) ---
        let audioCtx = null;
        let soundEnabled = true;
        let bgmInterval = null;
        const bgmMelody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; // 輕快的C大調琶音
        let bgmStep = 0;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊 音效開" : "🔇 音效關";
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 250);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime); // 背景音量較小，不干擾講話
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 叮！
            osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWrong() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); // 叭！
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playPop() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime); // 啵！
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        // --- 音效系統結束 ---

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const leftZone = document.getElementById('left-zone');
        const rightZone = document.getElementById('right-zone');
        const errorMsgEl = document.getElementById('error-msg');

        // 檢查設定並啟動遊戲
        function checkAndStart(speed) {
            const isSingle = document.getElementById('opt-single').checked;
            const isDouble = document.getElementById('opt-double').checked;
            const isTriple = document.getElementById('opt-triple').checked;
            
            // 取得自訂秒數
            let customDuration = parseInt(document.getElementById('game-duration').value);
            if (isNaN(customDuration) || customDuration < 10) {
                customDuration = 60; // 防呆機制，最小10秒或預設60秒
                document.getElementById('game-duration').value = 60;
            }

            activeVowels = [];
            if (isSingle) activeVowels.push(...vowelDatabase.single);
            if (isDouble) activeVowels.push(...vowelDatabase.double);
            if (isTriple) activeVowels.push(...vowelDatabase.triple);

            // 防呆機制：確保至少選了一個題庫
            if (activeVowels.length === 0) {
                errorMsgEl.innerText = "⚠️ 請至少勾選一種母音題庫！";
                return;
            }
            errorMsgEl.innerText = ""; // 清除錯誤訊息

            initAudio(); // 啟動音效引擎

            // 初始化或保留該題庫的學習統計資料
            activeVowels.forEach(v => {
                if (vowelStats[v] === undefined) {
                    vowelStats[v] = 0;
                }
            });

            startGame(speed, customDuration);
        }

        function startGame(speed, duration) {
            floatSpeed = speed;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            
            score = 0;
            timeLeft = duration;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;

            gameInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            
            if (soundEnabled && !bgmInterval) {
                bgmInterval = setInterval(playBGMNote, 250); // 啟動輕快背景音樂
            }
            
            startLeftPhase();
        }

        function endGame() {
            clearInterval(gameInterval);
            clearTimeout(phaseTimeout);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        // 強制中斷遊戲返回主選單
        function exitGame() {
            clearInterval(gameInterval);
            clearTimeout(phaseTimeout);
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            
            // 清空畫面上的氣球
            leftZone.querySelectorAll('.balloon').forEach(b => b.remove());
            rightZone.querySelectorAll('.balloon').forEach(b => b.remove());
            
            // 切換畫面
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function getWeightedVowels(count) {
            let pool = [];
            activeVowels.forEach(v => {
                let weight = Math.max(1, 10 - (vowelStats[v] * 2));
                for(let i=0; i<weight; i++) pool.push(v);
            });
            
            let results = [];
            // 如果請求的數量大於題庫總數，就只取題庫總數 (避免只有三母音時進入死迴圈)
            let maxCount = Math.min(count, activeVowels.length); 

            while(results.length < maxCount) {
                let pick = pool[Math.floor(Math.random() * pool.length)];
                if(!results.includes(pick)) results.push(pick);
            }
            return results;
        }

        function createBalloon(vowel, colIndex, totalCols, staggerDelay, isRightZone, onClick) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.innerText = vowel;
            b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 動態調整字體大小，確保三母音 (iau, oai) 不會凸出氣球
            if (vowel.length >= 3) {
                b.style.fontSize = '40px';
            } else if (vowel.length === 2) {
                b.style.fontSize = '50px';
            } else {
                b.style.fontSize = '60px'; // 單母音維持原本大小
            }
            
            const zoneWidth = isRightZone ? rightZone.clientWidth : leftZone.clientWidth;
            const safeBalloonWidth = 160; 
            
            let colWidth = 100 / totalCols;
            let randomOffset = (Math.random() * (colWidth * 0.4));
            let leftPercent = (colIndex * colWidth) + randomOffset + 2; 

            let calculatedLeft = (zoneWidth * leftPercent) / 100;
            calculatedLeft = Math.min(calculatedLeft, zoneWidth - safeBalloonWidth);
            calculatedLeft = Math.max(calculatedLeft, 10);
            
            b.style.left = calculatedLeft + 'px';
            b.style.animation = `floatUp ${floatSpeed}s linear ${staggerDelay}s forwards`;

            const handleEvent = (e) => { e.preventDefault(); onClick(); };
            b.addEventListener('mousedown', handleEvent);
            b.addEventListener('touchstart', handleEvent);
            return b;
        }

        function showFeedback(text, color) {
            const f = document.createElement('div');
            f.className = 'feedback';
            f.innerText = text; f.style.color = color;
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 800);
        }

        function startLeftPhase() {
            leftZone.querySelectorAll('.balloon').forEach(b => b.remove());
            rightZone.querySelectorAll('.balloon').forEach(b => b.remove());
            clearTimeout(phaseTimeout);

            // 左邊最多出 3 題 (如果題庫字數小於 3，則以題庫字數為準)
            let leftCount = Math.min(3, activeVowels.length);
            let delayOrder = Array.from({length: leftCount}, (_, i) => i).sort(() => Math.random() - 0.5);
            let picks = getWeightedVowels(leftCount);
            
            picks.forEach((v, i) => {
                let randomDelay = delayOrder[i] * 0.4;
                const b = createBalloon(v, i, leftCount, randomDelay, false, () => {
                    clearTimeout(phaseTimeout);
                    playPop(); // 播放點擊音效
                    currentTargetVowel = v;
                    startRightPhase();
                });
                leftZone.appendChild(b);
            });

            phaseTimeout = setTimeout(() => startLeftPhase(), (floatSpeed + 1.5) * 1000);
        }

        function startRightPhase() {
            leftZone.querySelectorAll('.balloon').forEach(b => b.remove());
            
            // 右邊最多出 6 題混淆視聽 (如果題庫字數小於 6，則以題庫字數為準)
            let rightCount = Math.min(6, activeVowels.length);
            let rightChoices = [currentTargetVowel]; // 確保一定有正確答案
            
            // 隨機選取剩下的混淆選項
            let shuffledActive = [...activeVowels].sort(() => Math.random() - 0.5);
            for (let v of shuffledActive) {
                if (rightChoices.length >= rightCount) break;
                if (v !== currentTargetVowel) {
                    rightChoices.push(v);
                }
            }
            
            rightChoices = rightChoices.sort(() => Math.random() - 0.5);
            let delayOrder = Array.from({length: rightCount}, (_, i) => i).sort(() => Math.random() - 0.5);
            
            rightChoices.forEach((v, i) => {
                let randomDelay = delayOrder[i] * 0.2;
                const b = createBalloon(v, i, rightCount, randomDelay, true, () => {
                    clearTimeout(phaseTimeout);
                    if (v === currentTargetVowel) {
                        score++;
                        scoreEl.innerText = score;
                        vowelStats[v]++; 
                        playCorrect(); // 播放答對音效
                        showFeedback('⭕', '#4CAF50');
                    } else {
                        playWrong(); // 播放答錯音效
                        showFeedback('❌', '#F44336');
                    }
                    setTimeout(startLeftPhase, 600);
                });
                rightZone.appendChild(b);
            });

            phaseTimeout = setTimeout(() => startLeftPhase(), (floatSpeed + 1.5) * 1000);
        }
    </script>
</body>
</html>
