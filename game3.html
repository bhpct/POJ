<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game 3：戰車大對決 (雙人攻守版)</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Noto Sans 確保中文字與白話字顯示乾淨現代 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ECEFF1;
            overflow: hidden;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        /* RWD 變數定義：根據螢幕寬度切換戰車與字體大小 */
        :root {
            --tank-w: 120px;
            --tank-h: 90px;
            --poj-sz: 20px;
            --hanzi-sz: 24px;
            --barrel-w: 20px;
            --barrel-h: 12px;
            --barrel-top: 39px;
        }
        @media (min-width: 480px) {
            :root {
                --tank-w: 150px; --tank-h: 110px;
                --poj-sz: 26px; --hanzi-sz: 32px;
                --barrel-w: 30px; --barrel-h: 16px; --barrel-top: 47px;
            }
        }
        @media (min-width: 768px) {
            :root {
                --tank-w: 190px; --tank-h: 140px;
                --poj-sz: 36px; --hanzi-sz: 45px;
                --barrel-w: 40px; --barrel-h: 20px; --barrel-top: 60px;
            }
        }

        /* 完美防護白話字體設定 */
        .poj-text { 
            font-family: 'Noto Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0 !important;
            padding-right: 0.15em;
            display: inline-block;
        }

        #game-container { display: flex; width: 100vw; height: 100vh; position: relative; }
        
        .play-zone { 
            flex: 1; position: relative; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s ease;
        }

        /* 雙血條 UI 設定 */
        .hp-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .hp-bar-bg {
            width: 100px; height: 16px; background: #FFF; border-radius: 10px; overflow: hidden; border: 2px solid #555;
        }
        @media (min-width: 768px) {
            .hp-bar-bg { width: 180px; height: 20px; border: 3px solid #555; }
        }
        .hp-bar-fill { height: 100%; transition: width 0.3s ease-out; }
        #hp-bar-1 { background: #4CAF50; width: 100%; } 
        #hp-bar-2 { background: #4CAF50; width: 100%; } 

        .zone-title {
            position: absolute; width: 100%; text-align: center;
            font-weight: 900; pointer-events: none; z-index: 0;
            top: 50%; transform: translateY(-50%); font-size: 35px;
            transition: color 0.3s;
        }
        @media (min-width: 768px) {
            .zone-title { top: 80px; transform: translateY(0); font-size: 55px; }
        }

        /* 網格推離中央，避免被圖示或河流擋住 */
        .tank-grid {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            gap: 15px; width: 95%; max-width: 380px; height: 85%;
            justify-items: center; align-items: center; z-index: 10;
        }
        @media (min-width: 768px) {
            .tank-grid { gap: 25px; width: 80%; max-width: none; height: 70%; margin-top: 100px; }
        }

        .tank-wrapper {
            position: relative; display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s;
        }
        
        /* 當輪到該區域攻擊時，戰車允許被點擊 */
        .can-attack .tank-wrapper { cursor: pointer; }
        .can-attack .tank-wrapper:hover { transform: scale(1.05); }
        .can-attack .tank-wrapper:active { transform: scale(0.95); }

        /* 移除 overflow: hidden 讓砲管跟履帶能正確超出車體顯示！ */
        .tank-body {
            width: var(--tank-w); height: var(--tank-h);
            background: #558B2F; border-radius: 15px;
            border: 4px solid #33691E;
            box-shadow: inset 0px -15px 0px rgba(0,0,0,0.2), 0 8px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; z-index: 10; padding: 5px;
            transition: all 0.2s;
        }

        .left-tank .tank-body::after {
            content: ''; position: absolute; top: var(--barrel-top); right: calc(var(--barrel-w) * -0.75);
            width: var(--barrel-w); height: var(--barrel-h); background: #33691E; border-radius: 0 5px 5px 0; z-index: -1;
        }
        .right-tank .tank-body::after {
            content: ''; position: absolute; top: var(--barrel-top); left: calc(var(--barrel-w) * -0.75);
            width: var(--barrel-w); height: var(--barrel-h); background: #33691E; border-radius: 5px 0 0 5px; z-index: -1;
        }

        .tank-body::before {
            content: ''; position: absolute; bottom: -12%; left: 5%;
            width: 90%; height: 20%; background: #212121; border-radius: 10px; z-index: -2;
        }

        /* 攻擊方鎖定的高亮特效 */
        .attacker-selected .tank-body {
            border-color: #FFD600; box-shadow: 0 0 20px #FFD600, inset 0px -15px 0px rgba(0,0,0,0.2);
        }

        /* 防守方被瞄準的紅色準星特效 */
        .crosshair-overlay {
            position: absolute; inset: 0; border-radius: 11px;
            background: rgba(0, 0, 0, 0.7); z-index: 15;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
            display: flex; justify-content: center; align-items: center;
        }
        .crosshair-overlay::after {
            content: ''; position: absolute; width: 140%; height: 140%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" stroke="%23FF1744" stroke-width="4" fill="none" stroke-dasharray="15, 10"/><line x1="50" y1="0" x2="50" y2="15" stroke="%23FF1744" stroke-width="5"/><line x1="50" y1="85" x2="50" y2="100" stroke="%23FF1744" stroke-width="5"/><line x1="0" y1="50" x2="15" y2="50" stroke="%23FF1744" stroke-width="5"/><line x1="85" y1="50" x2="100" y2="50" stroke="%23FF1744" stroke-width="5"/></svg>') no-repeat center center;
            background-size: contain;
            animation: rotateTarget 8s linear infinite;
        }
        @keyframes rotateTarget { 100% { transform: rotate(360deg); } }

        .targeted .crosshair-overlay { opacity: 1; }
        .targeted .text-container { z-index: 20; position: relative; transform: scale(1.15); transition: 0.2s; }
        .targeted .word-poj, .targeted .word-hanzi { color: #FFF; text-shadow: 0 0 10px #FFEB3B, 0 0 20px #FF5252; }

        .word-poj { font-size: var(--poj-sz); font-weight: bold; color: #FFF; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); line-height: 1.1; text-align: center; }
        .word-hanzi { font-size: var(--hanzi-sz); font-weight: bold; color: #FFF; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); line-height: 1.1; margin-top: 5px; text-align: center; }

        .explode { animation: explodeAnim 0.6s forwards; pointer-events: none; }
        @keyframes explodeAnim {
            0% { transform: scale(1); filter: brightness(1) sepia(0); }
            30% { transform: scale(1.4); filter: brightness(2) sepia(1) hue-rotate(-50deg); }
            100% { transform: scale(0); filter: brightness(0); opacity: 0; }
        }

        /* 遊戲結束結果標示 */
        .end-result-text {
            font-size: 80px; font-weight: 900; z-index: 50; text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: fadeInResult 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @media (min-width: 768px) { .end-result-text { font-size: 130px; } }
        @keyframes fadeInResult {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 流動的河水效果 */
        .river-pattern {
            background-color: #64B5F6;
            background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent);
            background-size: 40px 40px;
            animation: riverFlow 2s linear infinite;
        }
        @keyframes riverFlow {
            100% { background-position: 40px 0; }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 自動切換上下(手機) 或 左右(電腦) 佈局 -->
    <div id="game-container" class="flex-col md:flex-row">
        
        <!-- 頂部 雙血條 UI 面板 -->
        <div id="ui-layer" class="hidden absolute top-4 md:top-6 left-1/2 transform -translate-x-1/2 flex justify-between items-center z-50 bg-white/95 px-4 md:px-8 py-2 md:py-3 rounded-full shadow-lg w-11/12 max-w-2xl border-2 border-gray-200">
            <!-- 左/上方 血條 -->
            <div class="hp-container">
                <span id="hp-name-1" class="text-xs md:text-sm font-black text-gray-700 transition-colors">P1 血量</span>
                <div class="hp-bar-bg"><div id="hp-bar-1" class="hp-bar-fill"></div></div>
            </div>

            <!-- 時間與控制 -->
            <div class="flex flex-col items-center mx-2 md:mx-4">
                <div class="text-2xl md:text-4xl font-black text-gray-800 flex items-center">⏱️ <span id="timer" class="text-blue-600 ml-1">60</span></div>
                <div class="flex gap-2 mt-1">
                    <button onclick="exitGame()" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded font-bold text-xs md:text-sm transition-transform hover:scale-105">跳出</button>
                    <button id="btn-sound" onclick="toggleSound()" class="bg-teal-500 hover:bg-teal-600 text-white px-2 py-1 rounded font-bold text-xs md:text-sm transition-transform hover:scale-105">音效</button>
                </div>
            </div>

            <!-- 右/下方 血條 -->
            <div class="hp-container">
                <span id="hp-name-2" class="text-xs md:text-sm font-black text-gray-700 transition-colors">P2 血量</span>
                <div class="hp-bar-bg"><div id="hp-bar-2" class="hp-bar-fill"></div></div>
            </div>
        </div>

        <!-- 重玩按鈕 (遊戲結束顯示) -->
        <div id="restart-layer" class="hidden absolute top-10 left-1/2 transform -translate-x-1/2 z-[200]">
            <button onclick="location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white text-3xl font-black px-10 py-4 rounded-full shadow-[0_6px_0_#1565C0] hover:translate-y-1 hover:shadow-[0_2px_0_#1565C0] transition-all border-4 border-white">再玩一次</button>
        </div>

        <!-- 戰場區：左/上 -->
        <div id="left-zone" class="play-zone pt-24 md:pt-0">
            <div id="title-l-md" class="zone-title hidden md:block"></div>
            <div id="title-l-sm" class="zone-title md:hidden"></div>
            <div id="left-grid" class="tank-grid mb-12 md:mb-0 md:mr-24"></div>
            
            <!-- 左方專屬裁判面板 -->
            <div id="judge-panel-left" class="hidden absolute inset-0 bg-white/80 z-[60] flex-col items-center justify-center gap-4 backdrop-blur-sm">
                <div class="text-xl md:text-3xl font-black text-gray-800 bg-yellow-200 px-6 py-2 rounded-full shadow-md">對方唸對了嗎？</div>
                <div id="judge-word-left" class="text-4xl md:text-6xl font-black text-blue-900 bg-white border-4 border-blue-400 px-8 py-3 rounded-2xl shadow-lg my-2"></div>
                <div class="flex gap-4">
                    <button onclick="judgeTarget(true)" class="bg-green-500 hover:bg-green-600 text-white px-6 md:px-10 py-4 md:py-6 rounded-3xl font-black text-3xl md:text-5xl shadow-[0_6px_0_#2E7D32] hover:translate-y-1 hover:shadow-[0_2px_0_#2E7D32] transition-all">⭕ 對</button>
                    <button onclick="judgeTarget(false)" class="bg-red-500 hover:bg-red-600 text-white px-6 md:px-10 py-4 md:py-6 rounded-3xl font-black text-3xl md:text-5xl shadow-[0_6px_0_#C62828] hover:translate-y-1 hover:shadow-[0_2px_0_#C62828] transition-all">❌ 錯</button>
                </div>
            </div>
        </div>

        <!-- 中間分隔河道與身分圖示 -->
        <div id="river-divider" class="hidden w-full h-14 md:w-24 md:h-full relative z-20 shadow-[inset_0_0_15px_rgba(0,0,0,0.3)] river-pattern flex justify-center items-center shrink-0 border-y-4 md:border-y-0 md:border-x-4 border-blue-600">
            <!-- 左/上的狀態圖示 -->
            <div id="role-indicator-1" class="absolute flex flex-col items-center justify-center top-[-100px] md:top-1/2 md:left-[-150px] md:-translate-y-1/2 drop-shadow-2xl z-30 transition-transform duration-500 pointer-events-none">
                <div class="text-6xl md:text-8xl" id="icon-1">⚔️</div>
                <div class="text-xl md:text-3xl font-black text-red-600 mt-2 bg-white/90 px-4 py-1 rounded-full shadow-md border-2 border-red-300" id="role-text-1">攻擊</div>
            </div>
            
            <!-- 右/下的狀態圖示 -->
            <div id="role-indicator-2" class="absolute flex flex-col items-center justify-center bottom-[-100px] md:bottom-auto md:top-1/2 md:right-[-150px] md:-translate-y-1/2 drop-shadow-2xl z-30 transition-transform duration-500 pointer-events-none">
                <div class="text-6xl md:text-8xl" id="icon-2">🛡️</div>
                <div class="text-xl md:text-3xl font-black text-blue-600 mt-2 bg-white/90 px-4 py-1 rounded-full shadow-md border-2 border-blue-300" id="role-text-2">防守</div>
            </div>
        </div>
        
        <!-- 戰場區：右/下 -->
        <div id="right-zone" class="play-zone pb-4 md:pb-0">
            <div id="title-r-md" class="zone-title hidden md:block"></div>
            <div id="title-r-sm" class="zone-title md:hidden"></div>
            <div id="right-grid" class="tank-grid mt-12 md:mt-0 md:ml-24"></div>

            <!-- 右方專屬裁判面板 -->
            <div id="judge-panel-right" class="hidden absolute inset-0 bg-white/80 z-[60] flex-col items-center justify-center gap-4 backdrop-blur-sm">
                <div class="text-xl md:text-3xl font-black text-gray-800 bg-yellow-200 px-6 py-2 rounded-full shadow-md">對方唸對了嗎？</div>
                <div id="judge-word-right" class="text-4xl md:text-6xl font-black text-blue-900 bg-white border-4 border-blue-400 px-8 py-3 rounded-2xl shadow-lg my-2"></div>
                <div class="flex gap-4">
                    <button onclick="judgeTarget(true)" class="bg-green-500 hover:bg-green-600 text-white px-6 md:px-10 py-4 md:py-6 rounded-3xl font-black text-3xl md:text-5xl shadow-[0_6px_0_#2E7D32] hover:translate-y-1 hover:shadow-[0_2px_0_#2E7D32] transition-all">⭕ 對</button>
                    <button onclick="judgeTarget(false)" class="bg-red-500 hover:bg-red-600 text-white px-6 md:px-10 py-4 md:py-6 rounded-3xl font-black text-3xl md:text-5xl shadow-[0_6px_0_#C62828] hover:translate-y-1 hover:shadow-[0_2px_0_#C62828] transition-all">❌ 錯</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 開始選單 -->
    <div id="start-screen" class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center z-[100] p-4 overflow-y-auto">
        <div class="bg-white/10 p-6 md:p-10 rounded-3xl backdrop-blur-md max-w-4xl w-full border border-white/20 shadow-2xl flex flex-col items-center my-auto">
            <h1 class="text-4xl md:text-6xl text-yellow-300 font-black mb-2 text-center drop-shadow-lg">💥 戰車大對決 (雙人對戰)</h1>
            <p class="text-gray-200 text-lg md:text-2xl mb-8 text-center font-bold">攻擊方鎖定戰車，防守方大聲唸出字。<br>若防守方唸錯，攻擊方按下 ❌ 開火擊毀對方！</p>
            
            <div class="w-full bg-white/20 p-4 md:p-6 rounded-2xl mb-6">
                <div class="text-xl md:text-2xl text-white font-bold mb-4 border-b border-white/30 pb-2">👁️ 顯示模式 (至少選一)</div>
                <div class="flex flex-wrap justify-center gap-4 md:gap-6 mb-6">
                    <label class="flex items-center gap-3 cursor-pointer bg-blue-900/50 hover:bg-blue-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-poj" checked class="w-6 h-6 md:w-8 md:h-8 accent-blue-500">
                        <span class="text-white text-lg md:text-2xl font-bold">白話字</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer bg-green-900/50 hover:bg-green-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-hanzi" checked class="w-6 h-6 md:w-8 md:h-8 accent-green-500">
                        <span class="text-white text-lg md:text-2xl font-bold">漢字</span>
                    </label>
                </div>

                <div class="text-xl md:text-2xl text-white font-bold mb-4 border-b border-white/30 pb-2">🎯 敵軍題庫 (至少選一)</div>
                <div class="flex flex-wrap justify-center gap-4 md:gap-6">
                    <label class="flex items-center gap-2 cursor-pointer bg-purple-900/50 hover:bg-purple-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-bm" checked class="w-6 h-6 md:w-8 md:h-8 accent-purple-500">
                        <span class="text-white text-lg md:text-2xl font-bold">b / m</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-purple-900/50 hover:bg-purple-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-ln" checked class="w-6 h-6 md:w-8 md:h-8 accent-purple-500">
                        <span class="text-white text-lg md:text-2xl font-bold">l / n</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-purple-900/50 hover:bg-purple-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-gng" checked class="w-6 h-6 md:w-8 md:h-8 accent-purple-500">
                        <span class="text-white text-lg md:text-2xl font-bold">g / ng</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer bg-purple-900/50 hover:bg-purple-800/80 p-3 md:p-4 rounded-xl transition">
                        <input type="checkbox" id="opt-sj" checked class="w-6 h-6 md:w-8 md:h-8 accent-purple-500">
                        <span class="text-white text-lg md:text-2xl font-bold">s / j</span>
                    </label>
                </div>
                <div id="error-msg" class="text-red-300 font-bold text-lg md:text-xl text-center mt-3 h-6"></div>
            </div>

            <div class="flex items-center gap-4 bg-white/20 p-3 md:p-4 rounded-full mb-8">
                <span class="text-white text-lg md:text-2xl font-bold ml-2">⏳ 遊戲時間：</span>
                <input type="number" id="game-duration" value="60" min="10" max="600" class="w-20 md:w-24 text-center text-xl md:text-2xl font-black rounded-lg p-1 bg-white/90 text-blue-900 border-none outline-none">
                <span class="text-white text-lg md:text-2xl font-bold mr-2">秒</span>
            </div>
            
            <div class="flex flex-wrap justify-center gap-4 w-full">
                <button onclick="checkAndStart(10)" class="flex-1 min-w-[140px] bg-green-500 hover:bg-green-600 text-white text-xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#2E7D32] hover:translate-y-1 hover:shadow-[0_2px_0_#2E7D32] transition-all">簡單<br><span class="text-sm md:text-lg opacity-80">(X 扣 10滴血)</span></button>
                <button onclick="checkAndStart(20)" class="flex-1 min-w-[140px] bg-orange-500 hover:bg-orange-600 text-white text-xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#E65100] hover:translate-y-1 hover:shadow-[0_2px_0_#E65100] transition-all">普通<br><span class="text-sm md:text-lg opacity-80">(X 扣 20滴血)</span></button>
                <button onclick="checkAndStart(35)" class="flex-1 min-w-[140px] bg-red-500 hover:bg-red-600 text-white text-xl md:text-3xl font-black py-4 rounded-2xl shadow-[0_6px_0_#C62828] hover:translate-y-1 hover:shadow-[0_2px_0_#C62828] transition-all">挑戰<br><span class="text-sm md:text-lg opacity-80">(X 扣 35滴血)</span></button>
            </div>
        </div>
    </div>

    <script>
        // --- 精選無錯 240字 題庫 (8組 x 30個) ---
        const b_words = [
            {p:'bah',h:'肉'}, {p:'bīn',h:'面'}, {p:'bô',h:'無'}, {p:'bé',h:'買'}, {p:'bē',h:'賣'},
            {p:'ba̍k',h:'目'}, {p:'bián',h:'免'}, {p:'bîn',h:'民'}, {p:'bêng',h:'明'}, {p:'bāng',h:'夢'},
            {p:'bo̍k',h:'木'}, {p:'bûn',h:'文'}, {p:'bū',h:'務'}, {p:'bó',h:'母'}, {p:'bò͘',h:'報'},
            {p:'bô͘',h:'模'}, {p:'bō͘',h:'冒'}, {p:'bi̍t',h:'密'}, {p:'bâi',h:'眉'}, {p:'bān',h:'慢'},
            {p:'báng',h:'蚊'}, {p:'ba̍t',h:'識'}, {p:'beh',h:'欲'}, {p:'bín',h:'敏'}, {p:'bō',h:'帽'},
            {p:'bông',h:'亡'}, {p:'bong',h:'摸'}, {p:'bûn',h:'門'}, {p:'béng',h:'猛'}, {p:'beng',h:'盲'}

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').innerText = soundEnabled ? "🔊" : "🔇";
            document.getElementById('btn-sound').className = soundEnabled 
                ? "bg-teal-500 hover:bg-teal-600 text-white px-2 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow"
                : "bg-gray-500 hover:bg-gray-600 text-white px-2 md:px-4 py-1 md:py-2 rounded-lg font-bold text-sm md:text-lg transition-transform hover:scale-105 shadow";
            
            if (!soundEnabled && bgmInterval) {
                clearInterval(bgmInterval); bgmInterval = null;
            } else if (soundEnabled && !bgmInterval && !document.getElementById('ui-layer').classList.contains('hidden')) {
                bgmInterval = setInterval(playBGMNote, 300);
            }
        }

        function playBGMNote() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(bgmMelody[bgmStep], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            bgmStep = (bgmStep + 1) % bgmMelody.length;
        }

        function playLockOn() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playCorrect() {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playExplosion() {
            if (!soundEnabled || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.5);
        }

        function createTankDOM(wordObj, sideStr) {
            const wrapper = document.createElement('div');
            wrapper.className = `tank-wrapper ${sideStr === 'left' ? 'left-tank' : 'right-tank'}`;
            wrapper.dataset.word = wordObj.p;

            const body = document.createElement('div');

            // 準星與暗化特效層
            const crosshair = document.createElement('div');
            crosshair.className = 'crosshair-overlay';
            body.appendChild(crosshair);

            let htmlContent = '';
            if (showPOJ) htmlContent += `<div class="word-poj poj-text">${wordObj.p}</div>`;
            if (showHanzi) htmlContent += `<div class="word-hanzi">${wordObj.h}</div>`;
            
            const textContainer = document.createElement('div');
            textContainer.className = 'text-container';
            textContainer.innerHTML = htmlContent;
            body.appendChild(textContainer);

            wrapper.appendChild(body);
            
            // 點擊事件：攻擊方點擊自己畫面上的戰車來出題
            const handleInteract = (e) => {
                e.preventDefault();
                if (wrapper.classList.contains('explode')) return;
                
                // 防呆：攻擊方只能點擊「自己」區域的戰車
                if (currentTurn === 1 && sideStr !== 'left') return;
                if (currentTurn === 2 && sideStr !== 'right') return;
                if (targetedWordObj !== null) return; // 已經鎖定後就不能再點

                targetedWordObj = wordObj;

                // 自己的戰車打黃光
                wrapper.classList.add('attacker-selected');

                // 對手畫面上「對應單字」的戰車出現紅色準星
                let defSide = sideStr === 'left' ? 'right' : 'left';
                let defTank = document.querySelector(`.tank-wrapper[data-word="${wordObj.p}"].${defSide}-tank`);
                if(defTank) defTank.classList.add('targeted');

                playLockOn();

                // 在「攻擊方」的畫面上彈出裁判面板 (O/X)，並顯示被鎖定的題目
                if (sideStr === 'left') {
                    document.getElementById('judge-word-left').innerText = wordObj.p + (showHanzi ? ` (${wordObj.h})` : '');
                    document.getElementById('judge-panel-left').classList.remove('hidden');
                    document.getElementById('judge-panel-left').classList.add('flex');
                } else {
                    document.getElementById('judge-word-right').innerText = wordObj.p + (showHanzi ? ` (${wordObj.h})` : '');
                    document.getElementById('judge-panel-right').classList.remove('hidden');
                    document.getElementById('judge-panel-right').classList.add('flex');
                }
            };

            wrapper.addEventListener('mousedown', handleInteract);
            wrapper.addEventListener('touchstart', handleInteract);

            return wrapper;
        }

        function renderTanks() {
            leftGrid.innerHTML = ''; rightGrid.innerHTML = '';
            targetedWordObj = null;

            // 左右兩邊都用相同的 6 個字，但是各自打亂順序
            let leftOrder = [...currentWordsOnBoard].sort(() => Math.random() - 0.5);
            let rightOrder = [...currentWordsOnBoard].sort(() => Math.random() - 0.5);

            leftOrder.forEach(w => { leftGrid.appendChild(createTankDOM(w, 'left')); });
            rightOrder.forEach(w => { rightGrid.appendChild(createTankDOM(w, 'right')); });
        }

        // --- O/X 裁判判定邏輯 ---
        function judgeTarget(isCorrect) {
            // 隱藏兩個裁判面板
            document.getElementById('judge-panel-left').classList.add('hidden');
            document.getElementById('judge-panel-left').classList.remove('flex');
            document.getElementById('judge-panel-right').classList.add('hidden');
            document.getElementById('judge-panel-right').classList.remove('flex');

            let atkSide = currentTurn === 1 ? 'left' : 'right';
            let defSide = currentTurn === 1 ? 'right' : 'left';
            
            let atkTank = document.querySelector(`.tank-wrapper[data-word="${targetedWordObj.p}"].${atkSide}-tank`);
            let defTank = document.querySelector(`.tank-wrapper[data-word="${targetedWordObj.p}"].${defSide}-tank`);

            if (isCorrect) {
                playCorrect();
                if(atkTank) atkTank.classList.remove('attacker-selected');
                if(defTank) defTank.classList.remove('targeted');
                
                // 答對不扣血，短暫延遲後更新單字並攻守交換
                setTimeout(() => {
                    initField(); // 重新產生 6 個新題目並重新渲染雙方戰車
                    targetedWordObj = null;
                    switchTurn();
                }, 400);
                
            } else {
                playExplosion();
                if(atkTank) atkTank.classList.remove('attacker-selected');
                if(defTank) {
                    defTank.classList.remove('targeted');
                    defTank.classList.add('explode'); // 防守方戰車爆炸
                }
                
                // 扣除防守方血量
                if (currentTurn === 1) { p2Hp -= damagePerMiss; } 
                else { p1Hp -= damagePerMiss; }
                updateHP();

                if (p1Hp <= 0 || p2Hp <= 0) {
                    setTimeout(() => endGame(true), 800);
                } else {
                    setTimeout(() => {
                        initField(); // 重新產生 6 個新題目並重新渲染雙方戰車
                        targetedWordObj = null;
                        switchTurn(); // 開火完也要攻守交換
                    }, 800);
                }
            }
        }
    </script>
</body>
</html>
